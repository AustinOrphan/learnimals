<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn music theory, rhythm, and instruments with fun activities" />
    <title>Music with Melody - Learnimals</title>
    <script type="module">
      import SubjectTemplateLoader from '/src/utils/subjectTemplateLoader.js';

      // Define content for music page
      const musicOptions = {
        subjectName: 'Music',
        subjectLower: 'music',
        subjectDescription: 'Learn music theory, rhythm, and instruments with fun activities',
        characterName: 'Melody',
        characterType: 'Songbird',
        heroSubtitle: 'Learn music theory, rhythm, and instruments with fun activities',
        // Consistency decision: subject hero sections are title + subtitle only,
        // no mascot renderer (see science/reading/art which had their own images removed).
        enableCharacterRenderer: false,

        // Feature cards data for Card.js
        featureCardsData: [
          {
            title: 'Music Theory',
            content: '<p>Interactive music theory activities and games!</p>',
            linkUrl: '#music-theory',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Virtual Instruments',
            content: '<p>Interactive virtual instruments activities and games!</p>',
            linkUrl: '#virtual-instruments',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Rhythm Games',
            content: '<p>Interactive rhythm games activities and games!</p>',
            linkUrl: '#rhythm-games',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Song Composition',
            content: '<p>Interactive song composition activities and games!</p>',
            linkUrl: '#song-composition',
            linkText: 'Explore Now',
            theme: 'default',
          },
        ],
      };

      document.addEventListener('DOMContentLoaded', async () => {
        await SubjectTemplateLoader.renderTemplate(musicOptions);
      });
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="/src/styles/base/styles.css" />
    <link rel="stylesheet" href="/src/styles/components/navbar.css" />
    <link rel="stylesheet" href="/src/styles/components/components.css" />
    <link rel="stylesheet" href="/src/styles/components/themeSwitcher.css" />
    <link rel="stylesheet" href="/src/features/subjects/music/music.css" />
  </head>
  <body>
    <p>Loading Music content...</p>

    <!--
      No page-level scripts here: SubjectTemplateLoader.renderTemplate() rewrites the
      whole document with /src/templates/subject.html, which loads the theme scripts,
      navbar, component-loader, and music.js (as a module) in the correct order.
      Loading them here too fired them against the soon-discarded document and caused
      duplicate-declaration / parse errors.
    -->
  </body>
</html>
