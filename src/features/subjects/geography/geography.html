<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover countries, capitals, and cultures around the world" />
    <title>Geography with Atlas - Learnimals</title>
    <script type="module">
      import SubjectTemplateLoader from '/src/utils/subjectTemplateLoader.js';

      // Define content for geography page
      const geographyOptions = {
        subjectName: 'Geography',
        subjectLower: 'geography',
        subjectDescription: 'Discover countries, capitals, and cultures around the world',
        characterName: 'Atlas',
        characterType: 'Eagle',
        heroSubtitle: 'Discover countries, capitals, and cultures around the world',

        // Feature cards data for Card.js
        featureCardsData: [
          {
            title: 'World Map',
            content: '<p>Interactive world map activities and games!</p>',
            linkUrl: '#world-map',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Country Explorer',
            content: '<p>Interactive country explorer activities and games!</p>',
            linkUrl: '#country-explorer',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Capital Quiz',
            content: '<p>Interactive capital quiz activities and games!</p>',
            linkUrl: '#capital-quiz',
            linkText: 'Explore Now',
            theme: 'default',
          },
          {
            title: 'Culture Corner',
            content: '<p>Interactive culture corner activities and games!</p>',
            linkUrl: '#culture-corner',
            linkText: 'Explore Now',
            theme: 'default',
          },
        ],
      };

      document.addEventListener('DOMContentLoaded', async () => {
        await SubjectTemplateLoader.renderTemplate(geographyOptions);
      });
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="/src/styles/base/styles.css" />
    <link rel="stylesheet" href="/src/styles/components/navbar.css" />
    <link rel="stylesheet" href="/src/styles/components/components.css" />
    <link rel="stylesheet" href="/src/styles/components/themeSwitcher.css" />
    <link rel="stylesheet" href="/src/features/subjects/geography/geography.css" />
  </head>
  <body>
    <p>Loading Geography content...</p>

    <!--
      No page-level scripts here: SubjectTemplateLoader.renderTemplate() rewrites the
      whole document with /src/templates/subject.html, which loads the theme scripts,
      navbar, component-loader, and geography.js (as a module) in the correct order.
      Loading them here too fired them against the soon-discarded document and caused
      duplicate-declaration / parse errors.
    -->
  </body>
</html>
