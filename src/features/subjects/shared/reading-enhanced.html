<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Improve reading skills with Ruby the Panda - Interactive learning companion for kids"
    />
    <title>Reading with Ruby - Learnimals Enhanced</title>
    <link rel="icon" href="/public/images/favicon.ico" type="image/x-icon" />

    <!-- Enhanced loading message -->
    <style>
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }

      .loading-container.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-content {
        text-align: center;
        font-family: 'Arial', sans-serif;
      }

      .loading-character {
        width: 80px;
        height: 80px;
        background: #333;
        border-radius: 50%;
        margin: 0 auto 20px;
        position: relative;
        animation: bounce 1.5s ease-in-out infinite;
      }

      .loading-character::before {
        content: '';
        position: absolute;
        top: 15px;
        left: 15px;
        width: 50px;
        height: 50px;
        background: white;
        border-radius: 50%;
      }

      .loading-text {
        font-size: 18px;
        color: #333;
        margin: 10px 0;
      }

      .loading-subtitle {
        font-size: 14px;
        color: #666;
        opacity: 0.8;
      }

      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-20px);
        }
        60% {
          transform: translateY(-10px);
        }
      }

      .loading-dots {
        display: inline-block;
        width: 40px;
        text-align: left;
      }

      .loading-dots::after {
        content: '';
        animation: loading-dots 1.5s infinite;
      }

      @keyframes loading-dots {
        0% {
          content: '';
        }
        25% {
          content: '.';
        }
        50% {
          content: '..';
        }
        75% {
          content: '...';
        }
        100% {
          content: '';
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div class="loading-container" id="loading-screen">
      <div class="loading-content">
        <div class="loading-character"></div>
        <div class="loading-text">Ruby is getting ready<span class="loading-dots"></span></div>
        <div class="loading-subtitle">Loading your reading companion</div>
      </div>
    </div>

    <!-- Enhanced reading page will be loaded here by JavaScript -->
    <script type="module">
      // Import and initialize the enhanced reading page
      import '/src/features/subjects/reading/reading.js';

      // Hide loading screen once everything is loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 1000); // Give character time to initialize
      });

      // Performance tracking for testing
      const startTime = performance.now();

      // Listen for character ready event
      document.addEventListener('componentsLoaded', () => {
        const loadTime = performance.now() - startTime;
        console.log(`📊 Enhanced reading page loaded in ${loadTime.toFixed(2)}ms`);

        // Store performance metrics for testing
        window.readingPageMetrics = {
          totalLoadTime: loadTime,
          characterSystemEnabled: true,
          timestamp: Date.now(),
        };
      });

      // Fallback error handling
      window.addEventListener('error', e => {
        console.error('❌ Enhanced reading page error:', e.error);

        // If there's a critical error, show fallback
        if (e.error && e.error.message.includes('SubjectTemplateLoader')) {
          console.log('🔄 Falling back to original reading page...');
          window.location.href = '/src/features/subjects/shared/reading-original.html';
        }
      });
    </script>
  </body>
</html>
