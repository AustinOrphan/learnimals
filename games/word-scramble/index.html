<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Word Scramble - unscramble the letters to spell words with Ruby the Panda! A fun reading and spelling game for kids."
    />
    <title>Word Scramble - Learnimals</title>

    <link rel="stylesheet" href="/styles/base/styles.css" />
    <link rel="stylesheet" href="/styles/components/navbar.css" />
    <link rel="stylesheet" href="/styles/components/components.css" />
    <link rel="stylesheet" href="/styles/components/themeSwitcher.css" />
    <link rel="stylesheet" href="/games/word-scramble/wordScramble.css" />
    <link rel="icon" href="/public/images/favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#667eea" />

    <style>
      .word-scramble-page {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }

      .word-scramble-page .page-intro {
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .word-scramble-page .page-intro h1 {
        margin-bottom: 0.25rem;
      }

      .word-scramble-page .back-link {
        display: inline-block;
        margin-bottom: 1rem;
        font-weight: 600;
      }

      #word-scramble-game {
        min-height: 400px;
      }
    </style>
  </head>
  <body class="word-scramble-body">
    <!-- Navigation -->
    <div id="navbar-placeholder"></div>

    <main class="word-scramble-page">
      <a href="/subjects/reading/" class="back-link">← Back to Reading</a>
      <div class="page-intro">
        <h1>🐼 Word Scramble</h1>
        <p>Unscramble the letters to spell each word. Pick a difficulty and press Start!</p>
      </div>

      <!-- WordScrambleGame renders its full UI inside this container -->
      <div id="word-scramble-game"></div>
    </main>

    <!-- Core scripts -->
    <script defer type="module" src="/themeInitializer.js"></script>
    <script type="module" src="/utils/themeManager.js"></script>
    <script type="module" src="/components/layout/themeSwitcher.js"></script>
    <script defer src="/components/layout/navbarLoader.js"></script>

    <!-- Game -->
    <script type="module">
      import WordScrambleGame from '/games/word-scramble/wordScramble.js';

      document.addEventListener('DOMContentLoaded', () => {
        try {
          // BaseGame auto-initializes and injects the game UI into the container.
          new WordScrambleGame('word-scramble-game');
        } catch (error) {
          console.error('Failed to start Word Scramble:', error);
          const el = document.getElementById('word-scramble-game');
          if (el) {
            el.innerHTML =
              '<p style="text-align:center;padding:2rem;">Sorry, the game could not load. Please refresh to try again.</p>';
          }
        }
      });
    </script>
  </body>
</html>
