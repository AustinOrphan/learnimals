name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Full browser matrix for main branch, Chromium-only for PRs
        browser: ${{ github.event_name == 'pull_request' && fromJSON('["chromium"]') || fromJSON('["chromium", "firefox", "webkit"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # The @austinorphan/e2e-core dependency is file:../../e2e-core, so the
      # sibling repo must exist two levels above the package root. It is a
      # private repo: the E2E_CORE_TOKEN secret must hold a fine-grained PAT
      # with read access to AustinOrphan/e2e-core.
      - name: Checkout e2e-core (private sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          token: ${{ secrets.E2E_CORE_TOKEN }}
          path: .e2e-core-checkout

      - name: Place and build e2e-core where the file: dependency expects it
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # No manual server step: the Playwright config's webServer starts
      # `npm run serve` (repo root on port 3000) and waits for it.
      - name: Run Playwright tests
        run: npx playwright test --config e2e/playwright.config.ts --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
