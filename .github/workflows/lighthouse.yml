name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Build project
        run: |
          if grep -q "build" package.json; then
            npm run build
          else
            echo "No build script found, using source files"
          fi

      - name: Start server
        run: |
          # Start development server in background
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 &
          else
            npx serve . -p 3000 &
          fi

          # Wait for server to be ready
          sleep 10

          # Test server is running
          curl -f http://localhost:3000 || exit 1

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000 \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/subjects/math/ \
            --collect.url=http://localhost:3000/subjects/science/ \
            --collect.numberOfRuns=3 \
            --assert.assertions.categories:performance=0.8 \
            --assert.assertions.categories:accessibility=0.9 \
            --assert.assertions.categories:best-practices=0.9 \
            --assert.assertions.categories:seo=0.9 \
            --assert.assertions.categories:pwa=0.8 \
            --upload.target=temporary-public-storage || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: |
            .lighthouseci/
            lhci_reports/
          retention-days: 30

      - name: Performance Budget Check
        run: |
          # Check if performance budget file exists
          if [ -f "lighthouse-budget.json" ]; then
            echo "Running performance budget check..."
            lhci autorun --budgetsFile=lighthouse-budget.json || true
          else
            echo "No performance budget file found, skipping budget check"
          fi

  # performance-regression job removed 2026-07-17: its main-branch checkout
  # dance never produced a comparison (results discarded, echo-only), and it
  # could not fail (continue-on-error) — pure compute burn.

  mobile-performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Start server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 &
          else
            npx serve . -p 3000 &
          fi
          sleep 10

      - name: Run mobile Lighthouse audit
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000 \
            --collect.numberOfRuns=3 \
            --collect.settings.chromeFlags="--headless --no-sandbox --disable-gpu" \
            --collect.settings.emulatedFormFactor=mobile \
            --collect.settings.throttling.rttMs=150 \
            --collect.settings.throttling.throughputKbps=1600 \
            --collect.settings.throttling.cpuSlowdownMultiplier=4 \
            --assert.assertions.categories:performance=0.7 \
            --assert.assertions.categories:accessibility=0.9 \
            --upload.target=temporary-public-storage || true

      - name: Upload mobile results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-lighthouse-results
          path: |
            .lighthouseci/
            lhci_reports/
          retention-days: 30

  web-vitals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Install web-vitals
        run: npm install -g web-vitals

      - name: Start server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 &
          else
            npx serve . -p 3000 &
          fi
          sleep 10

      - name: Measure Core Web Vitals
        run: |
          # Install puppeteer for headless testing
          npm install puppeteer

          # Create web vitals test script
          cat > web-vitals-test.js << 'EOF'
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage']
            });
            
            const page = await browser.newPage();
            
            // Navigate to page
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle2' });
            
            // Measure performance
            const metrics = await page.evaluate(() => {
              return new Promise((resolve) => {
                new PerformanceObserver((list) => {
                  const entries = list.getEntries();
                  resolve(entries.map(entry => ({
                    name: entry.name,
                    value: entry.value,
                    delta: entry.delta
                  })));
                }).observe({ entryTypes: ['measure'] });
                
                // Trigger measurements
                setTimeout(() => resolve([]), 5000);
              });
            });
            
            console.log('Web Vitals Metrics:', JSON.stringify(metrics, null, 2));
            await browser.close();
          })();
          EOF

          # Run the test
          node web-vitals-test.js || true
