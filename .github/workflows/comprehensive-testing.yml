name: Comprehensive Testing Pipeline

on:
  push:
    branches: [main, develop, 'feature/*', 'test-implementation/*']
  pull_request:
    branches: [main, develop]
  schedule:
    # Run comprehensive tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'
  COVERAGE_THRESHOLD: 80

jobs:
  # Job 1: Code Quality and Linting
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality & Linting
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false
        
      - name: Check code formatting
        run: npm run lint:fix
        
      - name: Upload lint results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: lint-results
          path: |
            eslint-report.json
            eslint-report.html
          retention-days: 30

  # Job 2: Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: code-quality
    
    strategy:
      matrix:
        test-group: ['components', 'utils', 'features']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests - ${{ matrix.test-group }}
        run: |
          npm run test:unit -- --reporter=json --outputFile=test-results-${{ matrix.test-group }}.json
        env:
          CI: true
          
      - name: Generate coverage report - ${{ matrix.test-group }}
        run: |
          npm run test:unit -- --coverage --reporter=json --outputFile=coverage-${{ matrix.test-group }}.json
        
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: unit-test-results-${{ matrix.test-group }}
          path: |
            test-results-${{ matrix.test-group }}.json
            coverage-${{ matrix.test-group }}.json
          retention-days: 30
          
      - name: Comment test results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const testResults = JSON.parse(fs.readFileSync('test-results-${{ matrix.test-group }}.json', 'utf8'));
            
            const comment = `
            ## Unit Test Results - ${{ matrix.test-group }}
            
            ✅ **Passed:** ${testResults.numPassedTests}
            ❌ **Failed:** ${testResults.numFailedTests}
            ⏭️ **Skipped:** ${testResults.numPendingTests}
            ⏱️ **Duration:** ${testResults.testExecTime}ms
            
            ${testResults.numFailedTests > 0 ? '⚠️ Please fix failing tests before merging.' : '🎉 All tests passed!'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 3: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run integration tests
        run: |
          npm run test:integration -- --reporter=json --outputFile=integration-results.json
        env:
          CI: true
          
      - name: Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: integration-results.json
          retention-days: 30

  # Job 4: End-to-End Tests
  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: integration-tests
    
    strategy:
      matrix:
        browser: ['chromium', 'firefox']
        test-suite: ['user-journeys', 'accessibility', 'cross-browser']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }}
        
      - name: Start test server
        run: |
          npm run serve &
          sleep 5
        
      - name: Run E2E tests - ${{ matrix.test-suite }} on ${{ matrix.browser }}
        run: |
          npm run test:e2e:${{ matrix.test-suite }} -- --browser=${{ matrix.browser }} --reporter=json --outputFile=e2e-${{ matrix.browser }}-${{ matrix.test-suite }}.json
        env:
          CI: true
          
      - name: Upload E2E test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results-${{ matrix.browser }}-${{ matrix.test-suite }}
          path: |
            e2e-${{ matrix.browser }}-${{ matrix.test-suite }}.json
            test-results/
            screenshots/
          retention-days: 30

  # Job 5: Performance Tests
  performance-tests:
    runs-on: ubuntu-latest
    name: Performance Tests
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run performance tests
        run: |
          npm run test:performance -- --reporter=json --outputFile=performance-results.json
        env:
          CI: true
          
      - name: Analyze bundle size
        run: |
          npm run build
          npx bundlesize
          
      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v9
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          
      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-results
          path: |
            performance-results.json
            lighthouse-results/
            bundle-analysis/
          retention-days: 30

  # Job 6: Security Tests
  security-tests:
    runs-on: ubuntu-latest
    name: Security Tests
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security tests
        run: |
          npm run test:security -- --reporter=json --outputFile=security-results.json
        env:
          CI: true
          
      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit.json
        continue-on-error: true
        
      - name: Run Snyk security scan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx snyk test --json > snyk-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        
      - name: Upload security results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-results
          path: |
            security-results.json
            npm-audit.json
            snyk-results.json
          retention-days: 30

  # Job 7: Coverage Analysis
  coverage-analysis:
    runs-on: ubuntu-latest
    name: Coverage Analysis
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Download all test artifacts
        uses: actions/download-artifact@v3
        with:
          path: test-artifacts/
          
      - name: Merge coverage reports
        run: |
          npx nyc merge test-artifacts/*/coverage-*.json coverage/merged-coverage.json
          npx nyc report --reporter=html --reporter=text --reporter=json-summary
          
      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          echo "Current coverage: ${COVERAGE}%"
          
          if (( $(echo "${COVERAGE} < ${COVERAGE_THRESHOLD}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${COVERAGE_THRESHOLD}%"
          fi
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/coverage-final.json
          flags: comprehensive
          name: learnimals-coverage
          
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            
            const formatPercentage = (pct) => `${pct.toFixed(1)}%`;
            
            const comment = `
            ## Test Coverage Report
            
            | Type | Lines | Functions | Branches | Statements |
            |------|-------|-----------|----------|------------|
            | **Coverage** | ${formatPercentage(coverage.total.lines.pct)} | ${formatPercentage(coverage.total.functions.pct)} | ${formatPercentage(coverage.total.branches.pct)} | ${formatPercentage(coverage.total.statements.pct)} |
            | **Threshold** | ${process.env.COVERAGE_THRESHOLD}% | ${process.env.COVERAGE_THRESHOLD}% | ${process.env.COVERAGE_THRESHOLD}% | ${process.env.COVERAGE_THRESHOLD}% |
            
            ${coverage.total.lines.pct >= process.env.COVERAGE_THRESHOLD ? '✅ Coverage meets threshold!' : '❌ Coverage below threshold!'}
            
            [View detailed coverage report](https://codecov.io/gh/${{ github.repository }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 8: Visual Regression Tests
  visual-regression:
    runs-on: ubuntu-latest
    name: Visual Regression Tests
    needs: e2e-tests
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright
        run: npx playwright install chromium
        
      - name: Run visual regression tests
        run: |
          npm run test:visual -- --reporter=json --outputFile=visual-results.json
        env:
          CI: true
          
      - name: Upload visual diff artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-regression-results
          path: |
            visual-results.json
            test-results/
            visual-diffs/
          retention-days: 30

  # Job 9: Accessibility Tests
  accessibility-tests:
    runs-on: ubuntu-latest
    name: Accessibility Tests
    needs: e2e-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Start test server
        run: |
          npm run serve &
          sleep 5
        
      - name: Run accessibility tests
        run: |
          npm run test:accessibility -- --reporter=json --outputFile=accessibility-results.json
        env:
          CI: true
          
      - name: Run axe-core accessibility audit
        run: |
          npx @axe-core/cli http://localhost:3000 --save accessibility-audit.json --format json
        continue-on-error: true
        
      - name: Upload accessibility results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: accessibility-results
          path: |
            accessibility-results.json
            accessibility-audit.json
          retention-days: 30

  # Job 10: Test Report Generation
  generate-reports:
    runs-on: ubuntu-latest
    name: Generate Test Reports
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, security-tests, coverage-analysis]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all test artifacts
        uses: actions/download-artifact@v3
        with:
          path: all-test-results/
          
      - name: Generate comprehensive test report
        run: |
          node scripts/generate-test-report.js all-test-results/ > test-report.html
          
      - name: Upload test report
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-test-report
          path: |
            test-report.html
            all-test-results/
          retention-days: 90
          
      - name: Deploy test report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-reports
          destination_dir: test-reports

  # Job 11: Quality Gate
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    needs: [unit-tests, integration-tests, e2e-tests, performance-tests, security-tests, coverage-analysis]
    if: always()
    
    steps:
      - name: Evaluate quality metrics
        run: |
          echo "Evaluating quality gate..."
          
          # Check if all required jobs passed
          UNIT_TESTS="${{ needs.unit-tests.result }}"
          INTEGRATION_TESTS="${{ needs.integration-tests.result }}"
          E2E_TESTS="${{ needs.e2e-tests.result }}"
          COVERAGE="${{ needs.coverage-analysis.result }}"
          
          echo "Unit Tests: $UNIT_TESTS"
          echo "Integration Tests: $INTEGRATION_TESTS"
          echo "E2E Tests: $E2E_TESTS"
          echo "Coverage: $COVERAGE"
          
          # Determine overall quality gate status
          if [[ "$UNIT_TESTS" == "success" && "$INTEGRATION_TESTS" == "success" && 
                "$E2E_TESTS" == "success" && "$COVERAGE" == "success" ]]; then
            echo "✅ Quality Gate: PASSED"
            echo "All required tests passed and coverage threshold met."
          else
            echo "❌ Quality Gate: FAILED"
            echo "One or more required checks failed."
            exit 1
          fi
          
      - name: Update quality gate status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const qualityGateStatus = '${{ job.status }}' === 'success' ? 'PASSED' : 'FAILED';
            const emoji = qualityGateStatus === 'PASSED' ? '✅' : '❌';
            
            const comment = `
            ## ${emoji} Quality Gate: ${qualityGateStatus}
            
            ### Test Results Summary:
            - **Unit Tests:** ${{ needs.unit-tests.result }}
            - **Integration Tests:** ${{ needs.integration-tests.result }}
            - **E2E Tests:** ${{ needs.e2e-tests.result }}
            - **Performance Tests:** ${{ needs.performance-tests.result }}
            - **Security Tests:** ${{ needs.security-tests.result }}
            - **Coverage Analysis:** ${{ needs.coverage-analysis.result }}
            
            ${qualityGateStatus === 'PASSED' ? 
              '🎉 All quality checks passed! This PR is ready for review.' : 
              '⚠️ Quality gate failed. Please address the failing checks before merging.'}
            
            [View detailed test report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 12: Notification and Cleanup
  notify-and-cleanup:
    runs-on: ubuntu-latest
    name: Notify & Cleanup
    needs: quality-gate
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#development'
          text: |
            Comprehensive test pipeline completed for commit ${{ github.sha }}
            Quality Gate: ${{ needs.quality-gate.result }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          
      - name: Clean up old artifacts
        run: |
          echo "Test pipeline completed. Artifacts uploaded for analysis."
          echo "Quality Gate Status: ${{ needs.quality-gate.result }}"