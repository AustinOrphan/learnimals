name: Accessibility Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Weekly on Monday at 4 AM

jobs:
  axe-core-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install axe-core and puppeteer
        run: |
          npm install -g axe-core puppeteer
      
      - name: Start development server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 --directory src/pages &
          else
            npx serve src/pages -p 3000 &
          fi
          sleep 10
          curl -f http://localhost:3000 || exit 1
      
      - name: Run axe-core accessibility tests
        run: |
          # Create axe test script
          cat > axe-test.js << 'EOF'
          const puppeteer = require('puppeteer');
          const { createReadStream } = require('fs');
          
          const testPages = [
            'http://localhost:3000',
            'http://localhost:3000/activities',
            'http://localhost:3000/math',
            'http://localhost:3000/science',
            'http://localhost:3000/reading',
            'http://localhost:3000/art',
            'http://localhost:3000/coding'
          ];
          
          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage']
            });
            
            const results = [];
            
            for (const url of testPages) {
              console.log(`Testing: ${url}`);
              const page = await browser.newPage();
              
              try {
                await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
                
                // Inject axe-core
                await page.addScriptTag({ path: 'node_modules/axe-core/axe.min.js' });
                
                // Run axe
                const axeResults = await page.evaluate(() => {
                  return axe.run({
                    tags: ['wcag2a', 'wcag2aa', 'wcag21aa', 'best-practice']
                  });
                });
                
                results.push({
                  url,
                  violations: axeResults.violations.length,
                  passes: axeResults.passes.length,
                  details: axeResults.violations.map(v => ({
                    id: v.id,
                    impact: v.impact,
                    description: v.description,
                    nodes: v.nodes.length,
                    help: v.help,
                    helpUrl: v.helpUrl
                  }))
                });
                
                console.log(`  Violations: ${axeResults.violations.length}`);
                console.log(`  Passes: ${axeResults.passes.length}`);
                
              } catch (error) {
                console.error(`Error testing ${url}:`, error.message);
                results.push({
                  url,
                  error: error.message
                });
              }
              
              await page.close();
            }
            
            await browser.close();
            
            // Save results
            require('fs').writeFileSync('axe-results.json', JSON.stringify(results, null, 2));
            
            // Generate summary
            const totalViolations = results.reduce((sum, r) => sum + (r.violations || 0), 0);
            const totalPasses = results.reduce((sum, r) => sum + (r.passes || 0), 0);
            
            console.log('\n=== Accessibility Test Summary ===');
            console.log(`Total violations: ${totalViolations}`);
            console.log(`Total passes: ${totalPasses}`);
            
            if (totalViolations > 0) {
              console.log('\nViolations by page:');
              results.forEach(r => {
                if (r.violations > 0) {
                  console.log(`  ${r.url}: ${r.violations} violations`);
                  r.details.forEach(d => {
                    console.log(`    - ${d.id} (${d.impact}): ${d.description}`);
                  });
                }
              });
            }
            
            // Exit with error if critical violations found
            const criticalViolations = results.reduce((sum, r) => 
              sum + (r.details || []).filter(d => d.impact === 'critical').length, 0
            );
            
            if (criticalViolations > 0) {
              console.error(`\n❌ Found ${criticalViolations} critical accessibility violations!`);
              process.exit(1);
            }
            
            const seriousViolations = results.reduce((sum, r) => 
              sum + (r.details || []).filter(d => d.impact === 'serious').length, 0
            );
            
            if (seriousViolations > 5) {
              console.error(`\n⚠️ Found ${seriousViolations} serious accessibility violations!`);
              process.exit(1);
            }
            
            console.log('\n✅ Accessibility tests passed!');
          })();
          EOF
          
          # Run the test
          node axe-test.js
      
      - name: Upload axe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-results
          path: axe-results.json
          retention-days: 30

  pa11y-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Pa11y
        run: npm install -g pa11y
      
      - name: Start development server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 --directory src/pages &
          else
            npx serve src/pages -p 3000 &
          fi
          sleep 10
      
      - name: Run Pa11y tests
        run: |
          echo "Running Pa11y accessibility tests..."
          
          # Create pa11y configuration
          cat > pa11y.json << 'EOF'
          {
            "standard": "WCAG2AA",
            "includeNotices": false,
            "includeWarnings": true,
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-dev-shm-usage"]
            }
          }
          EOF
          
          # Test pages
          PAGES=(
            "http://localhost:3000"
            "http://localhost:3000/activities"
            "http://localhost:3000/math"
            "http://localhost:3000/science"
            "http://localhost:3000/reading"
            "http://localhost:3000/art"
            "http://localhost:3000/coding"
          )
          
          echo "# Pa11y Test Results" > pa11y-results.txt
          echo "Date: $(date)" >> pa11y-results.txt
          echo "" >> pa11y-results.txt
          
          TOTAL_ERRORS=0
          TOTAL_WARNINGS=0
          
          for page in "${PAGES[@]}"; do
            echo "Testing: $page"
            echo "## Testing: $page" >> pa11y-results.txt
            
            # Run pa11y and capture output
            pa11y --config pa11y.json --reporter cli "$page" > page-results.txt 2>&1 || true
            
            # Count errors and warnings
            PAGE_ERRORS=$(grep -c "Error:" page-results.txt || echo 0)
            PAGE_WARNINGS=$(grep -c "Warning:" page-results.txt || echo 0)
            
            TOTAL_ERRORS=$((TOTAL_ERRORS + PAGE_ERRORS))
            TOTAL_WARNINGS=$((TOTAL_WARNINGS + PAGE_WARNINGS))
            
            echo "  Errors: $PAGE_ERRORS, Warnings: $PAGE_WARNINGS"
            
            # Append to results
            cat page-results.txt >> pa11y-results.txt
            echo "" >> pa11y-results.txt
          done
          
          echo "=== Pa11y Summary ===" >> pa11y-results.txt
          echo "Total errors: $TOTAL_ERRORS" >> pa11y-results.txt
          echo "Total warnings: $TOTAL_WARNINGS" >> pa11y-results.txt
          
          echo "Total errors: $TOTAL_ERRORS"
          echo "Total warnings: $TOTAL_WARNINGS"
          
          # Fail if too many errors
          if [ $TOTAL_ERRORS -gt 0 ]; then
            echo "❌ Pa11y found $TOTAL_ERRORS accessibility errors!"
            exit 1
          fi
          
          if [ $TOTAL_WARNINGS -gt 10 ]; then
            echo "⚠️ Pa11y found $TOTAL_WARNINGS accessibility warnings!"
            exit 1
          fi
          
          echo "✅ Pa11y tests passed!"
      
      - name: Upload Pa11y results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-results
          path: pa11y-results.txt
          retention-days: 30

  keyboard-navigation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install chromium
      
      - name: Start development server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 --directory src/pages &
          else
            npx serve src/pages -p 3000 &
          fi
          sleep 10
      
      - name: Run keyboard navigation tests
        run: |
          # Create keyboard navigation test
          cat > keyboard-test.js << 'EOF'
          const { chromium } = require('playwright');
          
          async function testKeyboardNavigation() {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            
            const results = [];
            
            try {
              await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
              
              // Test tab navigation
              console.log('Testing tab navigation...');
              const focusableElements = [];
              
              // Find all focusable elements
              const focusable = await page.$$eval('*', elements => {
                return elements.filter(el => {
                  const style = window.getComputedStyle(el);
                  return (
                    el.tabIndex >= 0 ||
                    ['A', 'BUTTON', 'INPUT', 'SELECT', 'TEXTAREA'].includes(el.tagName) ||
                    el.contentEditable === 'true'
                  ) && style.display !== 'none' && style.visibility !== 'hidden';
                }).map(el => ({
                  tagName: el.tagName,
                  id: el.id,
                  className: el.className,
                  tabIndex: el.tabIndex
                }));
              });
              
              results.push({
                test: 'focusable-elements',
                count: focusable.length,
                elements: focusable
              });
              
              // Test tab order
              console.log('Testing tab order...');
              const tabOrder = [];
              
              // Start from first focusable element
              await page.keyboard.press('Tab');
              
              for (let i = 0; i < Math.min(focusable.length, 20); i++) {
                const activeElement = await page.evaluate(() => {
                  const el = document.activeElement;
                  return {
                    tagName: el.tagName,
                    id: el.id,
                    className: el.className,
                    textContent: el.textContent?.slice(0, 50),
                    tabIndex: el.tabIndex
                  };
                });
                
                tabOrder.push(activeElement);
                await page.keyboard.press('Tab');
              }
              
              results.push({
                test: 'tab-order',
                order: tabOrder
              });
              
              // Test escape key functionality
              console.log('Testing escape key...');
              await page.keyboard.press('Escape');
              
              // Test arrow key navigation (if applicable)
              console.log('Testing arrow key navigation...');
              const gridElements = await page.$$('[role="grid"], [role="listbox"], [role="menu"]');
              
              if (gridElements.length > 0) {
                await gridElements[0].focus();
                await page.keyboard.press('ArrowDown');
                await page.keyboard.press('ArrowRight');
                await page.keyboard.press('ArrowUp');
                await page.keyboard.press('ArrowLeft');
              }
              
              results.push({
                test: 'arrow-navigation',
                gridElementsFound: gridElements.length
              });
              
              // Test focus visibility
              console.log('Testing focus visibility...');
              const focusVisibility = await page.evaluate(() => {
                const elements = document.querySelectorAll('*');
                const results = [];
                
                for (const el of elements) {
                  if (el.tabIndex >= 0 || ['A', 'BUTTON', 'INPUT', 'SELECT', 'TEXTAREA'].includes(el.tagName)) {
                    el.focus();
                    const style = window.getComputedStyle(el);
                    const pseudoStyle = window.getComputedStyle(el, ':focus');
                    
                    const hasVisibleFocus = (
                      style.outline !== 'none' ||
                      style.outlineWidth !== '0px' ||
                      style.boxShadow !== 'none' ||
                      pseudoStyle.outline !== 'none' ||
                      pseudoStyle.outlineWidth !== '0px' ||
                      pseudoStyle.boxShadow !== 'none'
                    );
                    
                    if (!hasVisibleFocus) {
                      results.push({
                        tagName: el.tagName,
                        id: el.id,
                        className: el.className
                      });
                    }
                  }
                }
                
                return results;
              });
              
              results.push({
                test: 'focus-visibility',
                elementsWithoutFocus: focusVisibility
              });
              
            } catch (error) {
              results.push({
                test: 'error',
                error: error.message
              });
            }
            
            await browser.close();
            
            // Save results
            require('fs').writeFileSync('keyboard-test-results.json', JSON.stringify(results, null, 2));
            
            // Generate summary
            console.log('\n=== Keyboard Navigation Test Summary ===');
            results.forEach(result => {
              if (result.test === 'focusable-elements') {
                console.log(`Found ${result.count} focusable elements`);
              } else if (result.test === 'tab-order') {
                console.log(`Tab order tested with ${result.order.length} elements`);
              } else if (result.test === 'focus-visibility') {
                if (result.elementsWithoutFocus.length > 0) {
                  console.log(`⚠️ Found ${result.elementsWithoutFocus.length} elements without visible focus`);
                } else {
                  console.log('✅ All elements have visible focus indicators');
                }
              }
            });
            
            // Check for issues
            const focusIssues = results.find(r => r.test === 'focus-visibility')?.elementsWithoutFocus || [];
            if (focusIssues.length > 0) {
              console.error(`❌ Found ${focusIssues.length} elements without visible focus indicators`);
              process.exit(1);
            }
            
            console.log('✅ Keyboard navigation tests passed!');
          }
          
          testKeyboardNavigation();
          EOF
          
          # Run the test
          node keyboard-test.js
      
      - name: Upload keyboard test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-test-results
          path: keyboard-test-results.json
          retention-days: 30

  color-contrast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install color-contrast tools
        run: |
          npm install -g puppeteer
      
      - name: Start development server
        run: |
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 --directory src/pages &
          else
            npx serve src/pages -p 3000 &
          fi
          sleep 10
      
      - name: Run color contrast tests
        run: |
          # Create color contrast test
          cat > contrast-test.js << 'EOF'
          const puppeteer = require('puppeteer');
          
          function getLuminance(r, g, b) {
            const [rs, gs, bs] = [r, g, b].map(c => {
              c = c / 255;
              return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
          }
          
          function getContrastRatio(color1, color2) {
            const lum1 = getLuminance(...color1);
            const lum2 = getLuminance(...color2);
            const brightest = Math.max(lum1, lum2);
            const darkest = Math.min(lum1, lum2);
            return (brightest + 0.05) / (darkest + 0.05);
          }
          
          async function testColorContrast() {
            const browser = await puppeteer.launch({ headless: true });
            const page = await browser.newPage();
            
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle2' });
            
            const contrastResults = await page.evaluate(() => {
              const results = [];
              const elements = document.querySelectorAll('*');
              
              for (const element of elements) {
                const style = window.getComputedStyle(element);
                const color = style.color;
                const backgroundColor = style.backgroundColor;
                
                // Skip if no text content
                if (!element.textContent?.trim()) continue;
                
                // Parse colors
                const colorMatch = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                const bgColorMatch = backgroundColor.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                
                if (colorMatch && bgColorMatch) {
                  const textColor = [parseInt(colorMatch[1]), parseInt(colorMatch[2]), parseInt(colorMatch[3])];
                  const bgColor = [parseInt(bgColorMatch[1]), parseInt(bgColorMatch[2]), parseInt(bgColorMatch[3])];
                  
                  // Skip if background is transparent
                  if (bgColor[0] === 0 && bgColor[1] === 0 && bgColor[2] === 0) continue;
                  
                  const contrast = getContrastRatio(textColor, bgColor);
                  const fontSize = parseFloat(style.fontSize);
                  const fontWeight = style.fontWeight;
                  
                  const isLargeText = fontSize >= 18 || (fontSize >= 14 && (fontWeight === 'bold' || fontWeight >= 700));
                  const requiredRatio = isLargeText ? 3 : 4.5;
                  
                  if (contrast < requiredRatio) {
                    results.push({
                      element: element.tagName,
                      id: element.id,
                      className: element.className,
                      textColor: color,
                      backgroundColor: backgroundColor,
                      contrast: contrast.toFixed(2),
                      required: requiredRatio,
                      passes: false,
                      isLargeText,
                      fontSize: fontSize,
                      textContent: element.textContent.slice(0, 50)
                    });
                  }
                }
              }
              
              return results;
            });
            
            await browser.close();
            
            // Save results
            require('fs').writeFileSync('contrast-results.json', JSON.stringify(contrastResults, null, 2));
            
            console.log('\n=== Color Contrast Test Summary ===');
            console.log(`Found ${contrastResults.length} contrast violations`);
            
            if (contrastResults.length > 0) {
              console.log('\nContrast violations:');
              contrastResults.forEach((result, index) => {
                console.log(`${index + 1}. ${result.element} (${result.contrast}:1, required ${result.required}:1)`);
                console.log(`   Text: "${result.textContent}"`);
                console.log(`   Colors: ${result.textColor} on ${result.backgroundColor}`);
              });
              
              console.error(`\n❌ Found ${contrastResults.length} color contrast violations!`);
              process.exit(1);
            }
            
            console.log('✅ All color contrast tests passed!');
          }
          
          testColorContrast();
          EOF
          
          # Run the test
          node contrast-test.js
      
      - name: Upload contrast results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contrast-results
          path: contrast-results.json
          retention-days: 30

  accessibility-summary:
    runs-on: ubuntu-latest
    needs: [axe-core-testing, pa11y-testing, keyboard-navigation, color-contrast]
    if: always()
    steps:
      - name: Accessibility test summary
        run: |
          echo "Accessibility Test Results:"
          echo "=========================="
          echo "Axe Core Testing: ${{ needs.axe-core-testing.result }}"
          echo "Pa11y Testing: ${{ needs.pa11y-testing.result }}"
          echo "Keyboard Navigation: ${{ needs.keyboard-navigation.result }}"
          echo "Color Contrast: ${{ needs.color-contrast.result }}"
          
          # Create accessibility report
          echo "# Accessibility Test Report" > accessibility-report.md
          echo "Date: $(date)" >> accessibility-report.md
          echo "" >> accessibility-report.md
          echo "## Test Results" >> accessibility-report.md
          echo "- Axe Core Testing: ${{ needs.axe-core-testing.result }}" >> accessibility-report.md
          echo "- Pa11y Testing: ${{ needs.pa11y-testing.result }}" >> accessibility-report.md
          echo "- Keyboard Navigation: ${{ needs.keyboard-navigation.result }}" >> accessibility-report.md
          echo "- Color Contrast: ${{ needs.color-contrast.result }}" >> accessibility-report.md
          echo "" >> accessibility-report.md
          echo "## Standards Compliance" >> accessibility-report.md
          echo "- WCAG 2.1 Level AA: Targeting compliance" >> accessibility-report.md
          echo "- Keyboard Navigation: Full support required" >> accessibility-report.md
          echo "- Screen Reader: Compatible with NVDA, JAWS, VoiceOver" >> accessibility-report.md
          echo "- Color Contrast: 4.5:1 for normal text, 3:1 for large text" >> accessibility-report.md
          
          # Check if any tests failed
          if [ "${{ needs.axe-core-testing.result }}" == "failure" ] || \
             [ "${{ needs.pa11y-testing.result }}" == "failure" ] || \
             [ "${{ needs.keyboard-navigation.result }}" == "failure" ] || \
             [ "${{ needs.color-contrast.result }}" == "failure" ]; then
            echo "❌ Some accessibility tests failed"
            exit 1
          fi
          
          echo "✅ All accessibility tests passed"
      
      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: accessibility-report.md
          retention-days: 90