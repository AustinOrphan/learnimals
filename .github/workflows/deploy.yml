name: Deploy to GitHub Pages

# Deploys the static site to https://austinorphan.github.io/learnimals/.
# scripts/build-pages.mjs rewrites root-absolute /src/ and /public/ paths to
# the /learnimals/ subpath (the app is otherwise served from the repo root).
# Requires Pages to be enabled with Source = GitHub Actions in repo settings.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a newer push supersede an in-flight run.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Build _site (rewrite root-absolute paths for the /learnimals/ subpath)
        run: node scripts/build-pages.mjs
        env:
          PAGES_BASE: /learnimals

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
