name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        
      - name: Build site
        run: |
          # Create deployment directory structure
          mkdir -p _site
          
          # Copy main files
          cp -r src/pages/* _site/
          cp -r public/* _site/
          
          # Create proper directory structure
          mkdir -p _site/assets/images
          mkdir -p _site/src/components
          mkdir -p _site/src/styles
          mkdir -p _site/src/utils
          mkdir -p _site/src/config
          mkdir -p _site/src/features
          
          # Copy assets
          cp -r public/images/* _site/assets/images/ 2>/dev/null || true
          
          # Copy source files maintaining structure
          cp -r src/components _site/src/
          cp -r src/styles _site/src/
          cp -r src/utils _site/src/
          cp src/config.js _site/src/
          cp -r src/features _site/src/
          
          # Copy PWA files
          cp public/manifest.json _site/
          cp public/serviceWorker.js _site/
          
          # Create a simple 404 page
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>404 - Page Not Found</title><link rel="stylesheet" href="/src/styles/main.css"></head><body><h1>404 - Page Not Found</h1><p><a href="/">Go Home</a></p></body></html>' > _site/404.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4