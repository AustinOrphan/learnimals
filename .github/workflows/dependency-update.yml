name: Dependency Updates

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 3 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      
      - name: Check for updates
        id: updates
        run: |
          # Check for outdated packages
          OUTDATED=$(npm outdated --json || echo '{}')
          
          if [ "$OUTDATED" = "{}" ]; then
            echo "No updates available"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Updates available:"
            echo "$OUTDATED" | jq .
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Update dependencies
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          # Update dependencies
          npm update --save
          
          # Also check for major version updates
          npx npm-check-updates -u
          
          # Reinstall to update lock file
          npm install
      
      - name: Run tests
        if: steps.updates.outputs.has_updates == 'true'
        run: |
          npm run lint
          npm test
      
      - name: Create Pull Request
        if: steps.updates.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: automated dependency updates'
          body: |
            ## Automated Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### Updates included:
            ```json
            ${{ steps.updates.outputs.outdated }}
            ```
            
            ### Checklist
            - [ ] All tests pass
            - [ ] No breaking changes identified
            - [ ] Application works as expected
            
            🤖 Generated by GitHub Actions
          branch: deps/automated-update-${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            automated