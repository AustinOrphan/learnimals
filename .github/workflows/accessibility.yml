# Accessibility Testing — rewritten 2026-07-19.
# The previous version's axe, keyboard, and contrast jobs never executed:
# their heredoc scripts used CommonJS require() in .js files under a
# "type": "module" package, and depended on npm -g installs that Node's
# resolver cannot see. axe and keyboard now use the repo's own
# @playwright/test; the custom contrast job is gone (it was a worse
# duplicate of axe's color-contrast rule).
name: Accessibility Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Weekly on Monday at 4 AM

jobs:
  axe-core-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save axe-core
          npx playwright install --with-deps chromium

      - name: Start development server
        run: |
          python3 -m http.server 3000 &
          npx wait-on http://localhost:3000 -t 60000

      - name: Run axe-core audit
        run: |
          cat > axe-audit.mjs << 'EOF'
          import { chromium } from '@playwright/test';

          const pages = [
            '/',
            '/subjects/math/',
            '/subjects/science/',
            '/subjects/reading/',
            '/subjects/art/',
            '/subjects/coding/',
          ];

          const browser = await chromium.launch();
          const ctx = await browser.newContext({ reducedMotion: 'reduce' });
          let failures = 0;

          for (const p of pages) {
            const page = await ctx.newPage();
            await page.goto('http://localhost:3000' + p, { waitUntil: 'networkidle' });
            await page.addScriptTag({ path: 'node_modules/axe-core/axe.min.js' });
            const result = await page.evaluate(() =>
              axe.run(document, { runOnly: { type: 'tag', values: ['wcag2a', 'wcag2aa'] } })
            );
            console.log(`${p}: ${result.violations.length} violation types`);
            for (const v of result.violations) {
              failures += 1;
              console.log(`  [${v.impact}] ${v.id} (${v.nodes.length} nodes)`);
              for (const n of v.nodes.slice(0, 5)) {
                console.log(`    ${n.target[0]}`);
              }
            }
            await page.close();
          }

          await browser.close();
          if (failures > 0) {
            console.error(`FAIL: ${failures} WCAG 2.x A/AA violation types found`);
            process.exit(1);
          }
          console.log('PASS: zero axe violations');
          EOF
          node axe-audit.mjs

  pa11y-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Start development server
        run: |
          python3 -m http.server 3000 &
          npx wait-on http://localhost:3000 -t 60000

      - name: Run Pa11y tests
        run: |
          echo "Running Pa11y accessibility tests..."

          # includeWarnings stays off: pa11y emits ~90 indeterminate
          # "element contains transparency, verify manually" notices on this
          # design, which made any warning-count gate unwinnable. Errors gate.
          cat > pa11y.json << 'EOF'
          {
            "standard": "WCAG2AA",
            "includeNotices": false,
            "includeWarnings": false,
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-dev-shm-usage"]
            }
          }
          EOF

          PAGES=(
            "http://localhost:3000/"
            "http://localhost:3000/subjects/math/"
            "http://localhost:3000/subjects/science/"
            "http://localhost:3000/subjects/reading/"
            "http://localhost:3000/subjects/art/"
            "http://localhost:3000/subjects/coding/"
          )

          echo "# Pa11y Test Results" > pa11y-results.txt
          echo "" >> pa11y-results.txt

          TOTAL_ERRORS=0

          for page in "${PAGES[@]}"; do
            echo "Testing: $page"
            echo "## Testing: $page" >> pa11y-results.txt

            pa11y --config pa11y.json --reporter cli "$page" > page-results.txt 2>&1 || true

            # grep -c prints a count even on zero matches; '|| true' only
            # guards the nonzero exit (the old '|| echo 0' produced "0\n0").
            PAGE_ERRORS=$(grep -c "Error:" page-results.txt || true)

            TOTAL_ERRORS=$((TOTAL_ERRORS + PAGE_ERRORS))
            echo "  Errors: $PAGE_ERRORS"

            cat page-results.txt >> pa11y-results.txt
            echo "" >> pa11y-results.txt
          done

          echo "=== Pa11y Summary ===" >> pa11y-results.txt
          echo "Total errors: $TOTAL_ERRORS" >> pa11y-results.txt
          echo "Total errors: $TOTAL_ERRORS"

          if [ "$TOTAL_ERRORS" -gt 0 ]; then
            echo "FAIL: Pa11y found $TOTAL_ERRORS accessibility errors"
            exit 1
          fi

          echo "PASS: Pa11y found no errors"

      - name: Upload Pa11y results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-results
          path: pa11y-results.txt
          retention-days: 30

  keyboard-navigation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start development server
        run: |
          python3 -m http.server 3000 &
          npx wait-on http://localhost:3000 -t 60000

      - name: Run keyboard navigation checks
        run: |
          cat > keyboard-check.mjs << 'EOF'
          import { chromium } from '@playwright/test';

          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto('http://localhost:3000/', {
            waitUntil: 'networkidle',
          });
          await page.waitForSelector('#nav-menu a', { timeout: 10000 });

          const failures = [];

          // Tab through the page; focus must leave <body> and traverse
          // multiple distinct interactive elements in DOM order.
          const seen = [];
          for (let i = 0; i < 25; i++) {
            await page.keyboard.press('Tab');
            const info = await page.evaluate(() => {
              const el = document.activeElement;
              return el && el !== document.body
                ? { tag: el.tagName, href: el.getAttribute('href'), text: (el.textContent || '').trim().slice(0, 40) }
                : null;
            });
            if (info) seen.push(info);
          }

          if (seen.length < 5) {
            failures.push(`Tab traversal reached only ${seen.length} elements`);
          }

          const focusedLinks = seen.filter(e => e.tag === 'A' && e.href);
          if (focusedLinks.length < 3) {
            failures.push(`Only ${focusedLinks.length} links keyboard-reachable`);
          }

          const navHrefs = await page.$$eval('#nav-menu a', els => els.map(a => a.getAttribute('href')));
          const reachedNav = navHrefs.filter(h => focusedLinks.some(l => l.href === h));
          if (reachedNav.length < navHrefs.length) {
            failures.push(`Nav links keyboard-reachable: ${reachedNav.length}/${navHrefs.length}`);
          }

          await browser.close();

          if (failures.length > 0) {
            for (const f of failures) console.error('FAIL:', f);
            process.exit(1);
          }
          console.log(`PASS: ${seen.length} elements traversed, all ${navHrefs.length} nav links reachable`);
          EOF
          node keyboard-check.mjs

  accessibility-summary:
    runs-on: ubuntu-latest
    needs: [axe-core-testing, pa11y-testing, keyboard-navigation]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "axe-core: ${{ needs.axe-core-testing.result }}"
          echo "pa11y: ${{ needs.pa11y-testing.result }}"
          echo "keyboard: ${{ needs.keyboard-navigation.result }}"
          if [ "${{ needs.axe-core-testing.result }}" != "success" ] || \
             [ "${{ needs.pa11y-testing.result }}" != "success" ] || \
             [ "${{ needs.keyboard-navigation.result }}" != "success" ]; then
            echo "One or more accessibility jobs failed"
            exit 1
          fi
          echo "All accessibility checks passed"
