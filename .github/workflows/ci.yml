name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.setup.outputs.node-version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Read Node version
        id: setup
        run: |
          NODE_VERSION=$(cat .nvmrc 2>/dev/null || echo "20")
          echo "node-version=$NODE_VERSION" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Check code formatting
        run: |
          if command -v prettier &> /dev/null; then
            npx prettier --check "src/**/*.{js,html,css}"
          else
            echo "Prettier not configured, skipping format check"
          fi

  test:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [20, 22, 23]  # Updated to include latest LTS and current versions
        shard: [0, 1, 2, 3]  # 4 shards for parallel execution
      fail-fast: false  # Continue running other test suites even if one fails
    env:
      # Test environment variables
      NODE_ENV: test
      CI: true
      # Test database configuration (if needed)
      TEST_DB_URL: sqlite://./test.db
      # Browser testing environment
      BROWSER_ENV: headless
      # Performance testing thresholds
      PERFORMANCE_BUDGET_JS: 250000
      PERFORMANCE_BUDGET_CSS: 100000
      # Test timeouts
      TEST_TIMEOUT: 10000
      # Coverage thresholds
      COVERAGE_THRESHOLD: 70
      # Parallel test configuration
      SHARD_COUNT: 4
      SHARD_INDEX: ${{ matrix.shard }}
    name: Test (${{ matrix.node-version }}, shard ${{ matrix.shard + 1 }}/4)
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install system dependencies
        run: |
          # Install system packages needed for testing
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            jq \
            xvfb \
            libgtk-3-dev \
            libgbm-dev \
            libnss3-dev \
            libxss1 \
            libasound2-dev
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup test environment
        run: |
          # Create test directories if they don't exist
          mkdir -p tests/temp
          mkdir -p tests/coverage
          mkdir -p tests/reports
          
          # Set up test database if needed
          if [ -n "$TEST_DB_URL" ] && [ "$TEST_DB_URL" != "sqlite://./test.db" ]; then
            echo "Setting up test database..."
            # Add database setup commands here if needed
          fi
          
          # Start virtual display for browser testing
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          
          # Wait for virtual display to be ready
          sleep 3
          
          # Set additional test environment variables
          export CHROME_BIN=/usr/bin/google-chrome-stable
          export PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
          
          echo "Test environment configured with virtual display"
      
      - name: Run tests for shard ${{ matrix.shard + 1 }}
        run: |
          echo "Running tests for shard ${{ matrix.shard + 1 }} of 4..."
          
          # Get test files for this shard
          TEST_FILES=$(node scripts/test-sharding.js --pattern)
          
          if [ -z "$TEST_FILES" ]; then
            echo "No test files assigned to this shard"
            exit 0
          fi
          
          echo "Test files for this shard:"
          node scripts/test-sharding.js --list
          
          # Run tests with coverage for shard 0 on Node 20
          if [ "${{ matrix.shard }}" = "0" ] && [ "${{ matrix.node-version }}" = "20" ]; then
            echo "Running tests with coverage..."
            npx vitest run $TEST_FILES --coverage --reporter=verbose --reporter=junit --reporter=json --outputFile.junit=tests/reports/junit.xml --outputFile.json=tests/reports/test-results.json
          else
            echo "Running tests without coverage..."
            npx vitest run $TEST_FILES --reporter=verbose --reporter=junit --outputFile.junit=tests/reports/junit.xml
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
      
      - name: Generate coverage report
        if: matrix.node-version == 20 && matrix.shard == 0
        run: |
          echo "📊 Processing coverage report..."
          
          # Check if coverage data exists
          if [ -f coverage/lcov.info ]; then
            echo "✅ Coverage report found: coverage/lcov.info"
            
            # Generate coverage summary
            echo "### Coverage Summary" > coverage-summary.md
            echo "" >> coverage-summary.md
            
            # Extract coverage percentages using lcov-summary
            if command -v lcov-summary &> /dev/null || npx lcov-summary --help &> /dev/null 2>&1; then
              npx lcov-summary coverage/lcov.info >> coverage-summary.md
            else
              echo "Installing lcov-summary..."
              npm install -g lcov-summary
              npx lcov-summary coverage/lcov.info >> coverage-summary.md
            fi
            
            # Generate HTML coverage report
            if [ ! -f coverage/index.html ]; then
              echo "Generating HTML coverage report..."
              if command -v genhtml &> /dev/null; then
                genhtml coverage/lcov.info -o coverage/html
              else
                echo "genhtml not found, using nyc for HTML report"
                npx nyc report --reporter=html --report-dir=coverage/html
              fi
            fi
            
            # Create coverage badge data
            if [ -f coverage/coverage-summary.json ]; then
              COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct' 2>/dev/null || echo "0")
              echo "{\"coverage\": $COVERAGE}" > coverage/badge.json
              
              # Determine badge color
              if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
                BADGE_COLOR="brightgreen"
              elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
                BADGE_COLOR="yellow"
              else
                BADGE_COLOR="red"
              fi
              
              echo "{\"coverage\": $COVERAGE, \"color\": \"$BADGE_COLOR\"}" > coverage/badge-data.json
            fi
            
            # Display coverage summary in logs
            echo ""
            echo "📈 Coverage Report:"
            cat coverage-summary.md
            
          else
            echo "⚠️  No coverage data found. Unit tests may not have run with coverage enabled."
          fi
      
      - name: Check coverage thresholds
        if: matrix.node-version == 20 && matrix.shard == 0
        run: |
          if [ -f coverage/lcov.info ]; then
            # Extract coverage percentages
            COVERAGE=$(npx lcov-summary coverage/lcov.info | grep "Total" | awk '{print $2}' | sed 's/%//' 2>/dev/null || echo "0")
            echo "Total coverage: $COVERAGE%"
            echo "Required threshold: $COVERAGE_THRESHOLD%"
            
            # Check against configurable threshold
            if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "❌ Coverage ($COVERAGE%) is below $COVERAGE_THRESHOLD% threshold"
              exit 1
            else
              echo "✅ Coverage ($COVERAGE%) meets $COVERAGE_THRESHOLD% threshold"
            fi
          elif [ -f coverage/coverage-summary.json ]; then
            # Try alternative coverage format
            COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct' 2>/dev/null || echo "0")
            echo "Total coverage: $COVERAGE%"
            echo "Required threshold: $COVERAGE_THRESHOLD%"
            
            if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "❌ Coverage ($COVERAGE%) is below $COVERAGE_THRESHOLD% threshold"
              exit 1
            else
              echo "✅ Coverage ($COVERAGE%) meets $COVERAGE_THRESHOLD% threshold"
            fi
          else
            echo "⚠️  No coverage report found, skipping threshold check"
          fi
      
      - name: Upload coverage reports
        if: matrix.node-version == 20 && matrix.shard == 0
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Prepare test artifacts
        if: always()
        run: |
          # Create artifact directory structure
          mkdir -p test-artifacts/shard-${{ matrix.shard }}
          
          # Copy test reports if they exist
          if [ -d "tests/reports" ]; then
            cp -r tests/reports test-artifacts/shard-${{ matrix.shard }}/
          fi
          
          # Copy coverage data for shard 0
          if [ "${{ matrix.shard }}" = "0" ] && [ -d "coverage" ]; then
            cp -r coverage test-artifacts/shard-${{ matrix.shard }}/
          fi
          
          # Create test summary file
          cat > test-artifacts/shard-${{ matrix.shard }}/summary.json << EOF
          {
            "shard": ${{ matrix.shard }},
            "shard_count": 4,
            "node_version": "${{ matrix.node-version }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "${{ job.status }}"
          }
          EOF
          
          # Add shard test list
          node scripts/test-sharding.js --list --json > test-artifacts/shard-${{ matrix.shard }}/shard-info.json
          
          # Add screenshots if they exist (for e2e tests)
          if [ -d "screenshots" ]; then
            cp -r screenshots test-artifacts/shard-${{ matrix.shard }}/
          fi
          
          # Add logs if they exist
          if [ -d "logs" ]; then
            cp -r logs test-artifacts/shard-${{ matrix.shard }}/
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard${{ matrix.shard }}-node${{ matrix.node-version }}
          path: test-artifacts/
          retention-days: 30
          compression-level: 9
      
      - name: Upload coverage to artifact
        if: matrix.node-version == 20 && matrix.shard == 0 && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      
      - name: Publish coverage report comment
        if: matrix.node-version == 20 && matrix.shard == 0 && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read coverage summary
            let coverageComment = '## 📊 Test Coverage Report\n\n';
            
            if (fs.existsSync('coverage/coverage-summary.json')) {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;
              
              coverageComment += '| Metric | Coverage | Threshold |\n';
              coverageComment += '|--------|----------|----------|\n';
              coverageComment += `| Lines | ${total.lines.pct}% | 80% |\n`;
              coverageComment += `| Statements | ${total.statements.pct}% | 80% |\n`;
              coverageComment += `| Functions | ${total.functions.pct}% | 80% |\n`;
              coverageComment += `| Branches | ${total.branches.pct}% | 80% |\n`;
              
              // Add status emoji
              const allPassed = total.lines.pct >= 80 && total.statements.pct >= 80 && 
                               total.functions.pct >= 80 && total.branches.pct >= 80;
              coverageComment += '\n' + (allPassed ? '✅ All coverage thresholds met!' : '❌ Some coverage thresholds not met');
              
              // Add file-level coverage if available
              if (fs.existsSync('coverage-summary.md')) {
                const fileSummary = fs.readFileSync('coverage-summary.md', 'utf8');
                coverageComment += '\n\n<details>\n<summary>📁 File Coverage Details</summary>\n\n';
                coverageComment += '```\n' + fileSummary + '\n```\n';
                coverageComment += '</details>\n';
              }
            } else {
              coverageComment += '⚠️ No coverage data available\n';
            }
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('📊 Test Coverage Report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: coverageComment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageComment
              });
            }

      - name: Generate test summary
        if: matrix.node-version == 20 && always()
        run: |
          # Create test summary markdown
          cat > test-summary.md << 'EOF'
          ## 🧪 Test Results Summary
          
          ### Test Execution Status
          EOF
          
          # Add test results if junit report exists
          if [ -f tests/reports/junit.xml ]; then
            # Parse junit XML for test summary
            TOTAL_TESTS=$(grep -o 'tests="[0-9]*"' tests/reports/junit.xml | grep -o '[0-9]*' | head -1 || echo "0")
            FAILED_TESTS=$(grep -o 'failures="[0-9]*"' tests/reports/junit.xml | grep -o '[0-9]*' | head -1 || echo "0")
            SKIPPED_TESTS=$(grep -o 'skipped="[0-9]*"' tests/reports/junit.xml | grep -o '[0-9]*' | head -1 || echo "0")
            PASSED_TESTS=$((TOTAL_TESTS - FAILED_TESTS - SKIPPED_TESTS))
            
            cat >> test-summary.md << EOF
          
          - **Total Tests**: $TOTAL_TESTS
          - **✅ Passed**: $PASSED_TESTS
          - **❌ Failed**: $FAILED_TESTS
          - **⏭️ Skipped**: $SKIPPED_TESTS
          EOF
          fi
          
          # Add coverage information if available
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct' 2>/dev/null || echo "Unknown")
            cat >> test-summary.md << EOF
          
          ### 📊 Coverage Report
          - **Line Coverage**: $COVERAGE%
          - **Threshold**: $COVERAGE_THRESHOLD%
          EOF
          elif [ -f coverage/lcov.info ]; then
            COVERAGE=$(npx lcov-summary coverage/lcov.info | grep "Total" | awk '{print $2}' | sed 's/%//' 2>/dev/null || echo "Unknown")
            cat >> test-summary.md << EOF
          
          ### 📊 Coverage Report
          - **Line Coverage**: $COVERAGE%
          - **Threshold**: $COVERAGE_THRESHOLD%
          EOF
          fi
          
          # Add Node.js version matrix results
          cat >> test-summary.md << 'EOF'
          
          ### 🚀 Environment Matrix
          This build tested against Node.js versions: 20, 22, 23
          EOF
          
          echo "Test summary generated:"
          cat test-summary.md

      - name: Add test summary to job summary
        if: matrix.node-version == 20 && always()
        run: |
          if [ -f test-summary.md ]; then
            cat test-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment test summary on PR
        if: matrix.node-version == 20 && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (!fs.existsSync('test-summary.md')) {
              console.log('No test summary found to comment');
              return;
            }
            
            const testSummary = fs.readFileSync('test-summary.md', 'utf8');
            
            // Look for existing comment from this action
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🧪 Test Results Summary')
            );
            
            const commentBody = `${testSummary}
            
            <details>
            <summary>📋 View Full Test Report</summary>
            
            You can download the full test results and coverage reports from the [Actions artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).
            
            - **Test Results**: \`test-results\` artifact
            - **Coverage Report**: \`coverage-report\` artifact
            </details>
            
            ---
            *This comment was automatically generated by the CI pipeline.*`;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated existing test summary comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
              console.log('Created new test summary comment');
            }

  build:
    runs-on: ubuntu-latest
    needs: [setup, lint]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: |
          if grep -q "build" package.json; then
            npm run build
          else
            echo "No build script found, project is static"
          fi
      
      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            src/
            public/
            !src/**/*.test.js
            !src/**/*.spec.js
          retention-days: 30

  validate-html:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate HTML
        run: |
          # Install html-validate if not already present
          if ! command -v html-validate &> /dev/null; then
            npm install -g html-validate
          fi
          
          # Validate HTML files
          find src -name "*.html" -exec html-validate {} \; || true
      
      - name: Check for broken links
        run: |
          # Install linkchecker if available
          if command -v linkchecker &> /dev/null; then
            find src -name "*.html" -exec linkchecker --check-extern {} \; || true
          else
            echo "Link checker not available, skipping link validation"
          fi

  pwa-audit:
    runs-on: ubuntu-latest
    needs: [setup, build]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Start development server
        run: |
          # Start a simple HTTP server
          if command -v python3 &> /dev/null; then
            python3 -m http.server 3000 --directory src/pages &
          else
            npx serve src/pages -p 3000 &
          fi
          
          # Wait for server to be ready
          sleep 5
        
      - name: Run PWA audit
        run: |
          # Install lighthouse if not present
          npm install -g lighthouse
          
          # Run lighthouse audit
          lighthouse http://localhost:3000 \
            --chrome-flags="--headless --no-sandbox" \
            --output json \
            --output-path lighthouse-results.json \
            --only-categories pwa,performance,accessibility
        
      - name: Upload lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: lighthouse-results.json
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          npm audit --audit-level high
        continue-on-error: true
      
      - name: Run dependency scan
        run: |
          # Check for known security vulnerabilities
          npx audit-ci --moderate
        continue-on-error: true

  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    name: Test Summary
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all test results
        uses: actions/download-artifact@v5
        with:
          pattern: test-results-*
          path: ./all-test-results/
        continue-on-error: true
      
      - name: Aggregate test results
        run: |
          echo "## 🧪 Test Results Summary" > test-summary.md
          echo "" >> test-summary.md
          
          # Create combined artifacts directory
          mkdir -p combined-test-artifacts
          mkdir -p combined-test-artifacts/reports
          mkdir -p combined-test-artifacts/logs
          mkdir -p combined-test-artifacts/screenshots
          
          # Count total test results
          TOTAL_SUITES=0
          TOTAL_TESTS=0
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          
          # Process each shard result
          for shard_dir in ./all-test-results/test-results-shard*; do
            if [ -d "$shard_dir" ]; then
              SHARD_NAME=$(basename "$shard_dir" | sed 's/test-results-//')
              echo "### ${SHARD_NAME^} Results" >> test-summary.md
              
              # Check for junit.xml in the shard directory
              if [ -f "$shard_dir/test-artifacts/shard-*/reports/junit.xml" ]; then
                TOTAL_SUITES=$((TOTAL_SUITES + 1))
                
                # Parse junit results
                JUNIT_FILE=$(find "$shard_dir" -name "junit.xml" | head -1)
                if [ -f "$JUNIT_FILE" ]; then
                  TESTS=$(grep -o 'tests="[0-9]*"' "$JUNIT_FILE" | grep -o '[0-9]*' | head -1 || echo "0")
                  FAILURES=$(grep -o 'failures="[0-9]*"' "$JUNIT_FILE" | grep -o '[0-9]*' | head -1 || echo "0")
                  PASSED=$((TESTS - FAILURES))
                  
                  TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
                  TOTAL_FAILED=$((TOTAL_FAILED + FAILURES))
                  TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
                  
                  echo "- Total: $TESTS" >> test-summary.md
                  echo "- Passed: $PASSED ✅" >> test-summary.md
                  echo "- Failed: $FAILURES ❌" >> test-summary.md
                fi
              else
                echo "- No test results found" >> test-summary.md
              fi
              echo "" >> test-summary.md
            fi
          done
          
          # Overall summary
          echo "### Overall Results" >> test-summary.md
          echo "- **Test Suites**: $TOTAL_SUITES" >> test-summary.md
          echo "- **Total Tests**: $TOTAL_TESTS" >> test-summary.md
          echo "- **Passed**: $TOTAL_PASSED ✅" >> test-summary.md
          echo "- **Failed**: $TOTAL_FAILED ❌" >> test-summary.md
          
          if [ "$TOTAL_FAILED" -gt 0 ]; then
            echo "" >> test-summary.md
            echo "❌ **Tests Failed** - Please check the individual test suite results above." >> test-summary.md
          else
            echo "" >> test-summary.md
            echo "✅ **All Tests Passed!**" >> test-summary.md
          fi
          
          # Add to job summary
          cat test-summary.md >> $GITHUB_STEP_SUMMARY
          
          # Aggregate all test artifacts
          for artifact_dir in ./all-test-results/test-results-*; do
            if [ -d "$artifact_dir" ]; then
              # Copy test reports
              if [ -d "$artifact_dir/test-artifacts" ]; then
                cp -r "$artifact_dir/test-artifacts/"* combined-test-artifacts/ 2>/dev/null || true
              fi
              
              # Extract shard info from directory
              SHARD_INFO=$(basename "$artifact_dir" | sed 's/test-results-//')
              
              # Copy JUnit reports with shard prefix
              JUNIT_FILE=$(find "$artifact_dir" -name "junit.xml" | head -1)
              if [ -f "$JUNIT_FILE" ]; then
                cp "$JUNIT_FILE" "combined-test-artifacts/reports/${SHARD_INFO}-junit.xml"
              fi
            fi
          done
          
          # Create combined test report
          echo "# Combined Test Report" > combined-test-artifacts/README.md
          echo "" >> combined-test-artifacts/README.md
          echo "Generated on: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> combined-test-artifacts/README.md
          echo "" >> combined-test-artifacts/README.md
          cat test-summary.md >> combined-test-artifacts/README.md
          
          # Copy the summary file
          cp test-summary.md combined-test-artifacts/
      
      - name: Upload combined test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-results-combined
          path: combined-test-artifacts/
          retention-days: 30
          compression-level: 9
      
      - name: Create test report index
        if: always()
        run: |
          # Create an HTML index for easy navigation
          cat > combined-test-artifacts/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Test Results - Learnimals</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 20px; }
                  h1 { color: #333; }
                  .suite { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
                  .passed { background-color: #d4edda; }
                  .failed { background-color: #f8d7da; }
                  .link { margin: 5px 0; }
                  a { color: #007bff; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Test Results Overview</h1>
              <p>Generated: <script>document.write(new Date().toLocaleString());</script></p>
              
              <div class="suite">
                  <h2>Test Reports</h2>
                  <div class="link"><a href="README.md">Summary Report</a></div>
                  <div class="link"><a href="reports/">JUnit Reports</a></div>
                  <div class="link"><a href="coverage/">Coverage Report</a></div>
              </div>
              
              <div class="suite">
                  <h2>Test Suites</h2>
                  <ul id="suites"></ul>
              </div>
              
              <script>
                  // Dynamically list available test suites
                  const suites = ['unit', 'integration', 'components', 'navigation', 'security', 'performance'];
                  const list = document.getElementById('suites');
                  suites.forEach(suite => {
                      const li = document.createElement('li');
                      li.innerHTML = `<a href="${suite}/">${suite.charAt(0).toUpperCase() + suite.slice(1)} Tests</a>`;
                      list.appendChild(li);
                  });
              </script>
          </body>
          </html>
          EOF
          
      - name: Upload test report index
        if: always()  
        uses: actions/upload-artifact@v4
        with:
          name: test-results-index
          path: combined-test-artifacts/index.html
          retention-days: 30

  quality-gates:
    runs-on: ubuntu-latest
    needs: [lint, test, test-summary, build, validate-html, pwa-audit, security-scan]
    if: always()
    env:
      # Quality gate thresholds
      MIN_COVERAGE_THRESHOLD: 70
      MAX_BUILD_TIME_MINUTES: 5
      MAX_BUNDLE_SIZE_KB: 250
      MAX_CRITICAL_BUNDLE_SIZE_KB: 100
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc jq
      
      - name: Download test artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: test-results-*
          path: ./test-results/
        continue-on-error: true
      
      - name: Download coverage artifacts
        uses: actions/download-artifact@v5
        with:
          name: coverage-report
          path: ./coverage/
        continue-on-error: true
      
      - name: Quality Gate - Coverage Threshold
        run: |
          echo "🎯 Checking coverage threshold..."
          
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct' 2>/dev/null || echo "0")
          elif [ -f coverage/lcov.info ]; then
            # Install lcov-summary if needed
            if ! command -v lcov-summary &> /dev/null; then
              npm install -g lcov-summary
            fi
            COVERAGE=$(npx lcov-summary coverage/lcov.info | grep "Total" | awk '{print $2}' | sed 's/%//' 2>/dev/null || echo "0")
          else
            echo "⚠️  No coverage report found"
            COVERAGE=0
          fi
          
          echo "Current coverage: $COVERAGE%"
          echo "Required threshold: $MIN_COVERAGE_THRESHOLD%"
          
          if (( $(echo "$COVERAGE < $MIN_COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ QUALITY GATE FAILED: Coverage ($COVERAGE%) is below minimum threshold ($MIN_COVERAGE_THRESHOLD%)"
            exit 1
          else
            echo "✅ QUALITY GATE PASSED: Coverage meets minimum threshold"
          fi
      
      - name: Quality Gate - All Tests Must Pass
        run: |
          echo "🧪 Checking test results..."
          
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ QUALITY GATE FAILED: Tests did not pass"
            echo "Test job result: ${{ needs.test.result }}"
            exit 1
          fi
          
          # Check test summary if available
          if [ -f test-results/junit.xml ]; then
            FAILED_TESTS=$(grep -o 'failures="[0-9]*"' test-results/junit.xml | grep -o '[0-9]*' | head -1 || echo "0")
            if [ "$FAILED_TESTS" -gt "0" ]; then
              echo "❌ QUALITY GATE FAILED: $FAILED_TESTS test(s) failed"
              exit 1
            fi
          fi
          
          echo "✅ QUALITY GATE PASSED: All tests passed"
      
      - name: Quality Gate - Build Performance
        run: |
          echo "⚡ Checking build performance..."
          
          # Check build time (approximate from job duration)
          BUILD_START=$(date -d "${{ github.event.head_commit.timestamp }}" +%s 2>/dev/null || echo "0")
          BUILD_END=$(date +%s)
          BUILD_TIME_MINUTES=$(( (BUILD_END - BUILD_START) / 60 ))
          
          echo "Build time: ~$BUILD_TIME_MINUTES minutes"
          echo "Maximum allowed: $MAX_BUILD_TIME_MINUTES minutes"
          
          if [ "$BUILD_TIME_MINUTES" -gt "$MAX_BUILD_TIME_MINUTES" ]; then
            echo "⚠️  Build time ($BUILD_TIME_MINUTES min) exceeds target ($MAX_BUILD_TIME_MINUTES min)"
            echo "Consider optimizing the build process"
          else
            echo "✅ Build time is within acceptable limits"
          fi
      
      - name: Quality Gate - Bundle Size Analysis
        run: |
          echo "📦 Checking bundle sizes..."
          
          # Check if build artifacts exist
          BUNDLE_SIZE_OK=true
          
          # Check JavaScript bundle sizes
          if [ -d "src" ]; then
            JS_SIZE=$(find src -name "*.js" -exec cat {} \; | wc -c)
            JS_SIZE_KB=$((JS_SIZE / 1024))
            
            echo "JavaScript bundle size: ${JS_SIZE_KB}KB"
            echo "Maximum allowed: ${MAX_BUNDLE_SIZE_KB}KB"
            
            if [ "$JS_SIZE_KB" -gt "$MAX_BUNDLE_SIZE_KB" ]; then
              echo "❌ JavaScript bundle size (${JS_SIZE_KB}KB) exceeds limit (${MAX_BUNDLE_SIZE_KB}KB)"
              BUNDLE_SIZE_OK=false
            fi
          fi
          
          # Check CSS bundle sizes
          if [ -d "src" ]; then
            CSS_SIZE=$(find src -name "*.css" -exec cat {} \; | wc -c 2>/dev/null || echo "0")
            CSS_SIZE_KB=$((CSS_SIZE / 1024))
            
            echo "CSS bundle size: ${CSS_SIZE_KB}KB"
            echo "Maximum allowed: ${MAX_CRITICAL_BUNDLE_SIZE_KB}KB"
            
            if [ "$CSS_SIZE_KB" -gt "$MAX_CRITICAL_BUNDLE_SIZE_KB" ]; then
              echo "❌ CSS bundle size (${CSS_SIZE_KB}KB) exceeds limit (${MAX_CRITICAL_BUNDLE_SIZE_KB}KB)"
              BUNDLE_SIZE_OK=false
            fi
          fi
          
          if [ "$BUNDLE_SIZE_OK" = true ]; then
            echo "✅ QUALITY GATE PASSED: Bundle sizes are within limits"
          else
            echo "❌ QUALITY GATE FAILED: Bundle size limits exceeded"
            exit 1
          fi
      
      - name: Quality Gate - Code Quality
        run: |
          echo "🔍 Checking code quality..."
          
          # Lint must pass
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "❌ QUALITY GATE FAILED: Linting failed"
            exit 1
          fi
          
          # Build must pass
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ QUALITY GATE FAILED: Build failed"
            exit 1
          fi
          
          echo "✅ QUALITY GATE PASSED: Code quality checks passed"
      
      - name: Quality Gate - Security Standards
        run: |
          echo "🔒 Checking security standards..."
          
          # Security scan should not fail critically
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "⚠️  Security scan failed - review security issues"
            # Don't fail the build for security scan failures (they're often false positives)
            # but log the warning
          fi
          
          echo "✅ QUALITY GATE PASSED: Security standards checked"
      
      - name: Quality Gate - Performance Benchmarks
        run: |
          echo "🚀 Running performance benchmarks..."
          
          # Check PWA audit results if available
          if [ "${{ needs.pwa-audit.result }}" == "success" ]; then
            echo "✅ PWA audit passed"
          else
            echo "⚠️  PWA audit had issues - check lighthouse results"
          fi
          
          # Benchmark loading times (simulated)
          echo "📊 Performance Benchmarks:"
          echo "- First Contentful Paint target: < 1.5s"
          echo "- Largest Contentful Paint target: < 2.5s"
          echo "- Cumulative Layout Shift target: < 0.1"
          echo "- First Input Delay target: < 100ms"
          
          # These would be extracted from lighthouse results in a real scenario
          echo "✅ Performance benchmarks noted (review lighthouse artifacts for details)"
      
      - name: Final Quality Gate Summary
        run: |
          echo "📋 Quality Gates Summary:"
          echo "============================"
          echo "✅ Coverage Threshold: PASSED"
          echo "✅ All Tests Pass: PASSED"
          echo "✅ Code Quality: PASSED"
          echo "✅ Security Standards: CHECKED"
          echo "✅ Bundle Size Limits: CHECKED"
          echo "✅ Performance Benchmarks: NOTED"
          echo "============================"
          
          # Final status based on critical job results
          if [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ OVERALL QUALITY GATE: FAILED"
            echo "Critical jobs failed - deployment blocked"
            exit 1
          fi
          
          echo "🎉 OVERALL QUALITY GATE: PASSED"
          echo "All quality gates passed - ready for deployment"