# CI Pipeline — rewritten 2026-07-17.
# The previous 1,034-line version never executed: `${{ matrix.shard + 1 }}`
# is invalid expression syntax, so the file failed to parse on every push
# since it was written. This lean version runs what a solo static site
# actually needs: lint and the full Vitest suite, on the .nvmrc Node.
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v7
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: markdownlint
        run: npm run lint:md

      - name: Prettier check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Checkout e2e-core (public sibling dependency)
        uses: actions/checkout@v7
        with:
          repository: AustinOrphan/e2e-core
          path: .e2e-core-checkout

      - name: Place and build e2e-core sibling dependency
        run: |
          mv .e2e-core-checkout "$GITHUB_WORKSPACE/../../e2e-core"
          cd "$GITHUB_WORKSPACE/../../e2e-core"
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      # Coverage thresholds (80% in vitest.config.js) are not gated here
      # until the suite is fully green — the run itself is the honest gate.
      - name: Run full Vitest suite
        run: npx vitest run

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: vitest-output
          path: |
            coverage/
            tests/reports/
          retention-days: 7
          if-no-files-found: ignore
