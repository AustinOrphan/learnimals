<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b640;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b680;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="#9b59b6" stroke-width="4"/>
  
  <!-- Character emoji -->
  <text x="100" y="120" font-size="80" text-anchor="middle" font-family="Arial, sans-serif">
    🐦
  </text>
  
  <!-- Character name -->
  <text x="100" y="160" font-size="16" text-anchor="middle" font-family="Arial, sans-serif" 
        fill="#9b59b6" font-weight="bold">
    Melody
  </text>
  
  <!-- Subject name -->
  <text x="100" y="180" font-size="12" text-anchor="middle" font-family="Arial, sans-serif" 
        fill="#9b59b6cc">
    Music Music Teacher
  </text>
</svg>