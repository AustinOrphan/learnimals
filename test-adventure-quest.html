<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Quest Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .test-status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        #gameCanvas {
            border: 2px solid #4a90e2;
            border-radius: 8px;
            background: #fff;
            max-width: 100%;
            height: auto;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background: #4a90e2;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #357abd;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .test-log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🚀 Adventure Quest Game Test</h1>
        <p>This page tests the Adventure Quest game implementation to ensure it's playable.</p>
        
        <div id="testResults"></div>
        
        <h2>Game Canvas</h2>
        <canvas id="gameCanvas" width="800" height="450">
            Your browser doesn't support HTML5 Canvas. Please update your browser.
        </canvas>
        
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn" disabled>Pause</button>
            <button id="resetBtn">Reset</button>
            <button id="storyBtn" disabled>Load Story</button>
            <button id="challengeBtn" disabled>Load Challenge</button>
            <button id="navBtn" disabled>Load Navigation</button>
            <button id="testBtn">Run Tests</button>
        </div>
        
        <div class="test-log" id="testLog"></div>
    </div>

    <script type="module">
        // Basic CSS variables for theme support
        document.documentElement.style.setProperty('--accent-primary', '#4a90e2');
        document.documentElement.style.setProperty('--accent-secondary', '#7ed321');
        document.documentElement.style.setProperty('--bg-primary', '#ffffff');
        document.documentElement.style.setProperty('--bg-card', '#f8f9fa');
        document.documentElement.style.setProperty('--text-primary', '#333333');
        document.documentElement.style.setProperty('--text-secondary', '#666666');
        document.documentElement.style.setProperty('--text-danger', '#dc3545');
        document.documentElement.style.setProperty('--text-success', '#28a745');

        const testResults = document.getElementById('testResults');
        const testLog = document.getElementById('testLog');
        let game = null;
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${timestamp}] ${message}`;
            if (type !== 'info') {
                logEntry.style.color = type === 'error' ? '#dc3545' : '#28a745';
                logEntry.style.fontWeight = 'bold';
            }
            testLog.appendChild(logEntry);
            testLog.scrollTop = testLog.scrollHeight;
            console.log(`[AdventureQuest Test] ${message}`);
        }
        
        function showResult(message, success) {
            const div = document.createElement('div');
            div.className = `test-status ${success ? 'success' : 'error'}`;
            div.textContent = message;
            testResults.appendChild(div);
        }
        
        async function runTests() {
            log('Starting Adventure Quest tests...', 'success');
            testResults.innerHTML = '';
            
            try {
                // Test 1: Import game modules
                log('Test 1: Importing game modules...');
                const AdventureQuestGame = await import('./src/features/games/adventure-quest/AdventureQuestGame.js');
                showResult('✓ Successfully imported AdventureQuestGame', true);
                log('AdventureQuestGame imported successfully', 'success');
                
                // Test 2: Create game instance
                log('Test 2: Creating game instance...');
                game = new AdventureQuestGame.default('gameCanvas', {
                    playerName: 'TestPlayer',
                    soundEnabled: false
                });
                showResult('✓ Game instance created successfully', true);
                log('Game instance created successfully', 'success');
                
                // Test 3: Check game systems
                log('Test 3: Checking game systems...');
                if (game.storyProgression && game.challengeManager && 
                    game.discoveryTracker && game.islandNavigator) {
                    showResult('✓ All game systems initialized', true);
                    log('All game systems initialized correctly', 'success');
                } else {
                    throw new Error('Game systems not properly initialized');
                }
                
                // Test 4: Test initial render
                log('Test 4: Testing initial render...');
                game.render();
                showResult('✓ Initial render completed', true);
                log('Initial render completed successfully', 'success');
                
                // Test 5: Test scene loading
                log('Test 5: Testing scene loading...');
                game.loadScene('intro');
                if (game.gameState.currentScene === 'intro') {
                    showResult('✓ Scene loading works', true);
                    log('Scene loading works correctly', 'success');
                } else {
                    throw new Error('Scene loading failed');
                }
                
                // Test 6: Test story system
                log('Test 6: Testing story system...');
                game.storyProgression.loadStory({ chapter: 'introduction' });
                if (game.storyProgression.currentChapter) {
                    showResult('✓ Story system working', true);
                    log('Story system working correctly', 'success');
                } else {
                    throw new Error('Story system failed');
                }
                
                // Test 7: Test discovery system
                log('Test 7: Testing discovery system...');
                const initialCount = game.discoveryTracker.discoveries.length;
                game.discoveryTracker.addDiscovery({
                    type: 'test',
                    name: 'Test Discovery',
                    points: 50
                });
                if (game.discoveryTracker.discoveries.length > initialCount) {
                    showResult('✓ Discovery system working', true);
                    log('Discovery system working correctly', 'success');
                } else {
                    throw new Error('Discovery system failed');
                }
                
                // Test 8: Test save/load
                log('Test 8: Testing save/load system...');
                game.saveProgress();
                const saved = game.loadProgress();
                if (saved) {
                    showResult('✓ Save/load system working', true);
                    log('Save/load system working correctly', 'success');
                } else {
                    showResult('⚠ Save/load system - no saved data found (normal for first run)', true);
                    log('Save/load system - no saved data (expected for first run)', 'success');
                }
                
                // Enable control buttons
                document.getElementById('startBtn').disabled = false;
                document.getElementById('storyBtn').disabled = false;
                document.getElementById('challengeBtn').disabled = false;
                document.getElementById('navBtn').disabled = false;
                
                showResult('🎉 All tests passed! Game is ready to play.', true);
                log('All tests completed successfully!', 'success');
                
            } catch (error) {
                showResult(`✗ Test failed: ${error.message}`, false);
                log(`Test failed: ${error.message}`, 'error');
                console.error('Adventure Quest test error:', error);
            }
        }
        
        // Control button handlers
        document.getElementById('startBtn').addEventListener('click', () => {
            if (game) {
                log('Starting game...', 'success');
                game.startGame();
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('startBtn').textContent = 'Restart';
            }
        });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (game) {
                game.togglePause();
                const btn = document.getElementById('pauseBtn');
                btn.textContent = game.gameState.isPaused ? 'Resume' : 'Pause';
                log(`Game ${game.gameState.isPaused ? 'paused' : 'resumed'}`);
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (game) {
                log('Resetting game...', 'success');
                game.loadScene('intro');
                game.gameState.isPlaying = false;
                game.gameState.isPaused = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('startBtn').textContent = 'Start Game';
            }
        });
        
        document.getElementById('storyBtn').addEventListener('click', () => {
            if (game) {
                log('Loading story scene...', 'success');
                game.loadScene('story', { chapter: 'introduction' });
            }
        });
        
        document.getElementById('challengeBtn').addEventListener('click', () => {
            if (game) {
                log('Loading challenge scene...', 'success');
                game.loadScene('challenge', { type: 'physics', challenge: 'gravity_basics' });
            }
        });
        
        document.getElementById('navBtn').addEventListener('click', () => {
            if (game) {
                log('Loading navigation scene...', 'success');
                game.loadScene('navigation');
            }
        });
        
        document.getElementById('testBtn').addEventListener('click', runTests);
        
        // Auto-run tests on page load
        window.addEventListener('load', () => {
            setTimeout(runTests, 500);
        });
        
        // Handle canvas clicks for game interaction
        document.getElementById('gameCanvas').addEventListener('click', (e) => {
            if (game && game.gameState.isPlaying) {
                const rect = e.target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                log(`Canvas clicked at (${Math.round(x)}, ${Math.round(y)})`);
                
                // Route click to game
                if (game.gameState.currentScene === 'intro') {
                    game.handleIntroClick(x, y);
                } else {
                    game.routeClick(x, y);
                }
            }
        });
        
        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (game && game.gameState.isPlaying) {
                log(`Key pressed: ${e.code}`);
                if (e.code === 'Space') {
                    e.preventDefault();
                    document.getElementById('pauseBtn').click();
                }
            }
        });
    </script>
</body>
</html>
