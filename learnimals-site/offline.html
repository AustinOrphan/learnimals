<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Learnimals</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #fdf6e3;
      color: #333;
      text-align: center;
      padding: 20px;
      line-height: 1.6;
    }
    
    .offline-container {
      max-width: 600px;
      margin: 50px auto;
      background-color: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #0984e3;
      font-size: 2rem;
      margin-bottom: 20px;
    }
    
    img {
      max-width: 200px;
      margin: 20px 0;
      animation: float 3s ease-in-out infinite;
    }
    
    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    
    .retry-button {
      padding: 10px 20px;
      background-color: #00b894;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      font-family: inherit;
    }
    
    .retry-button:hover {
      background-color: #00a382;
      transform: scale(1.05);
    }
    
    .cached-games {
      margin-top: 30px;
      border-top: 2px dashed #dfe6e9;
      padding-top: 20px;
    }
    
    .cached-link {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background-color: #ffeaa7;
      color: #2d3436;
      text-decoration: none;
      border-radius: 10px;
      transition: transform 0.2s;
    }
    
    .cached-link:hover {
      transform: scale(1.05);
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }
    
    /* Theme colors for dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #222f3e;
        color: #f5f6fa;
      }
      
      .offline-container {
        background-color: #2d3436;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      }
      
      .cached-link {
        background-color: #686de0;
        color: #f5f6fa;
      }
      
      .retry-button {
        background-color: #00d1a0;
      }
      
      .retry-button:hover {
        background-color: #00c492;
      }
    }
    
    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background-color: #ffeaa7;
      color: #2d3436;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    
    .dark-mode .theme-toggle {
      background-color: #686de0;
      color: #f5f6fa;
    }
    
    .theme-toggle:hover {
      transform: translateY(-3px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <h1>Oops! You're Offline</h1>
    <img src="assets/images/sad-shark.png" alt="Sad Mango the Shark" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22 viewBox=%220 0 200 200%22><circle cx=%22100%22 cy=%22100%22 r=%2280%22 fill=%22%238ed1fc%22 /><circle cx=%2270%22 cy=%2280%22 r=%2210%22 fill=%22white%22 /><circle cx=%22130%22 cy=%2280%22 r=%2210%22 fill=%22white%22 /><path d=%22M70 130 Q100 100 130 130%22 stroke=%22%232d3436%22 stroke-width=%224%22 fill=%22transparent%22 /></svg>'">
    
    <p>It looks like you don't have an internet connection right now. Some Learnimals features won't work until you're back online.</p>
    
    <button class="retry-button" onclick="window.location.reload()">Try Again</button>
    
    <div class="cached-games">
      <h2>But don't worry!</h2>
      <p>You can still access these games that were saved for offline use:</p>
      <div id="cached-links">
        <!-- These links will be populated by JavaScript if they're in the cache -->
        <a href="subjects/bubblepop.html" class="cached-link">Bubble Pop</a>
        <a href="subjects/math.html" class="cached-link">Math Tools</a>
      </div>
    </div>
  </div>

  <script>
    // This script checks which pages are available in the cache
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Show a custom offline message if no cached content is available
        const cachedLinksContainer = document.getElementById('cached-links');
        
        if (!'caches' in window) {
          cachedLinksContainer.innerHTML = '<p>Your browser doesn\'t support offline content.</p>';
          return;
        }
        
        const cache = await caches.open('learnimals-cache-v1');
        if (!cache) {
          cachedLinksContainer.innerHTML = '<p>No cached content available yet. Visit pages while online to use them offline later!</p>';
        }
      } catch (error) {
        console.error('Error checking caches:', error);
      }
    });
    
    // Basic theme toggle for offline page
    const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    const themeToggleBtn = document.createElement('button');
    themeToggleBtn.className = 'theme-toggle';
    themeToggleBtn.setAttribute('aria-label', 'Toggle dark mode');
    
    // Check if dark mode was saved or system prefers dark
    const savedMode = localStorage.getItem('learnimals-theme-mode');
    const isDarkMode = savedMode === 'dark' || 
                     (!savedMode && darkModeMediaQuery.matches);
    
    // Apply initial theme
    if (isDarkMode) {
      document.body.classList.add('dark-mode');
      themeToggleBtn.textContent = '☀️ Light';
    } else {
      themeToggleBtn.textContent = '🌙 Dark';
    }
    
    // Handle theme toggle
    themeToggleBtn.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark-mode');
      themeToggleBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
      localStorage.setItem('learnimals-theme-mode', isDark ? 'dark' : 'light');
    });
    
    // Add toggle button to the page
    document.body.appendChild(themeToggleBtn);
  </script>
</body>
</html>
