<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="{{subjectDescription}}"
        />
        <title>{{subjectName}} - Learnimals</title>
        <link rel="stylesheet" href="/learnimals-site/css/styles.css" />
        <link rel="stylesheet" href="/learnimals-site/css/navbar.css" />
        <link rel="stylesheet" href="/learnimals-site/css/subjects/{{subjectLower}}.css" />
        <script defer src="/learnimals-site/js/{{subjectLower}}.js"></script>
        <script defer src="/learnimals-site/js/components/Card.js"></script>
    </head>
    <body>
        <!-- Dynamic navbar load -->
        <div id="navbar-placeholder"></div>

        <main>            <section class="hero">
                <h2>{{subjectName}} with {{characterName}} the {{characterType}}!</h2>
                <p>{{heroSubtitle}}</p>
            </section>            <section class="features" id="feature-cards-container">
                <!-- Feature cards will be dynamically rendered here -->
                <div id="fallback-content">{{featureCards}}</div>
            </section>
            
            <script>
                // Feature cards will be rendered using Card.js
                document.addEventListener('DOMContentLoaded', function() {
                    if (typeof featureCardsData !== 'undefined') {
                        try {
                            const container = document.getElementById('feature-cards-container');
                            const fallbackContent = document.getElementById('fallback-content');
                            
                            if (fallbackContent) {
                                // Hide fallback content when using Card.js
                                fallbackContent.style.display = 'none';
                            }
                            
                            // Render each card from the feature cards data
                            featureCardsData.forEach(function(cardData) {
                                if (cardData.isLinked && cardData.linkUrl) {
                                    // For linked cards
                                    const linkedCardHTML = Card.createLinkedCard(cardData, cardData.linkUrl);
                                    container.innerHTML += linkedCardHTML;
                                } else {
                                    // For regular cards
                                    const card = new Card(cardData);
                                    card.render(container);
                                }
                            });
                            
                            // Process any script tags in the card content to make sure event handlers work
                            Array.from(container.querySelectorAll('.card-content')).forEach(function(contentDiv) {
                                const scriptTags = contentDiv.querySelectorAll('script');
                                scriptTags.forEach(function(oldScript) {
                                    const newScript = document.createElement('script');
                                    Array.from(oldScript.attributes).forEach(attr => {
                                        newScript.setAttribute(attr.name, attr.value)
                                    });
                                    newScript.textContent = oldScript.textContent;
                                    oldScript.parentNode.replaceChild(newScript, oldScript);
                                });
                            });
                        } catch (error) {
                            console.error('Error rendering feature cards:', error);
                            // Show fallback content if Card.js rendering fails
                            if (fallbackContent) {
                                fallbackContent.style.display = 'block';
                            }
                        }
                    }
                });
            </script>
        </main>

        <footer>
            <p>&copy; 2025 Learnimals. All rights reserved.</p>
            <div class="footer-links">
                <a href="/learnimals-site/about.html">About Us</a>
                <a href="/learnimals-site/contact.html">Contact</a>
                <a href="#" aria-label="Read our privacy policy"
                    >Privacy Policy</a
                >
                <a href="/learnimals-site/profile.html">My Profile</a>
            </div>
        </footer>

        <!-- JS -->
        <script defer type="module" src="/learnimals-site/js/themeInitializer.js"></script>
        <script
            type="module"
            src="/learnimals-site/js/utils/themeManager.js"
        ></script>
        <script
            type="module"
            src="/learnimals-site/js/components/themeSwitcher.js"
        ></script>
        <script
            defer
            src="/learnimals-site/js/components/navbarLoader.js"
        ></script>
        
        <!-- Subject-specific JavaScript -->
        <script defer src="/learnimals-site/js/{{subjectLower}}.js"></script>
        
        <!-- Script to ensure all functions are available -->
        <script>
            window.addEventListener('load', function() {
                console.log('Subject page fully loaded: {{subjectName}}');
                
                // Check if any buttons with onclick attributes exist but the functions don't
                document.querySelectorAll('[onclick]').forEach(function(el) {
                    const fnName = el.getAttribute('onclick').replace(/\(.*\)$/g, '');
                    if (typeof window[fnName] !== 'function') {
                        console.warn(`Function ${fnName} not found but is referenced in an onclick attribute`);
                    }
                });
            });
        </script>
    </body>
</html>
