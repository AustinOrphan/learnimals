<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Pop Quick Test</title>
    <link rel="stylesheet" href="./learnimals-site/css/styles.css">
    <link rel="stylesheet" href="./src/styles/components/games/game-hero.css">
    <style>
        body {
            margin: 20px;
            background: var(--bg-primary, #f8f9fa);
            color: var(--text-primary, #333);
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        .controls button {
            margin: 5px;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: var(--accent-primary, #007bff);
            color: white;
            cursor: pointer;
        }
        
        canvas {
            border: 1px solid var(--border-color, #ddd);
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .status {
            margin: 10px 0;
            padding: 10px;
            background: var(--bg-card, white);
            border-radius: 4px;
            border: 1px solid var(--border-color, #ddd);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Bubble Pop Game - Theme Color Test</h1>
        
        <div class="controls">
            <button onclick="toggleTheme()">Toggle Dark/Light Mode</button>
            <button onclick="location.reload()">Reload Page</button>
        </div>
        
        <div class="game-hero">
            <div class="hero-content">
                <h2 class="game-title">Bubble Pop Math</h2>
                <p class="game-description">Solve math problems by popping the correct bubble!</p>
                <div class="game-controls">
                    <button class="btn btn-primary">Start Game</button>
                    <button class="btn btn-secondary">Instructions</button>
                </div>
            </div>
        </div>
        
        <canvas id="bubble-canvas" width="600" height="400"></canvas>
        
        <div class="status" id="status">
            Loading game...
        </div>
    </div>

    <!-- Theme system -->
    <script src="./src/themeInitializer.js"></script>
    <script type="module" src="./src/utils/themeManager.js"></script>
    
    <script type="module">
        import BubblePopGameTemplate from './src/features/games/bubble-pop/BubblePopGameTemplate.js';
        
        let game = null;
        let isDark = false;
        
        async function initGame() {
            const status = document.getElementById('status');
            
            try {
                status.textContent = 'Initializing game...';
                
                if (game) {
                    game.destroy();
                }
                
                game = new BubblePopGameTemplate('bubble-canvas', {
                    difficulty: 'easy'
                });
                
                await game.onInitialized();
                
                // Check theme colors
                const colors = game.ensureThemeColors();
                const colorsList = Object.entries(colors)
                    .map(([k, v]) => `${k}: ${v}`)
                    .join(', ');
                
                status.innerHTML = `Game loaded! Theme colors: ${colorsList}`;
                
            } catch (error) {
                console.error('Game initialization error:', error);
                status.textContent = `Error: ${error.message}`;
            }
        }
        
        window.toggleTheme = function() {
            isDark = !isDark;
            const newTheme = isDark ? 'night' : 'default';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            if (!isDark) {
                document.documentElement.setAttribute('data-theme-name', 'default');
            }
            
            // Save to localStorage
            localStorage.setItem('learnimals-theme-mode', isDark ? 'dark' : 'light');
            
            // Trigger theme change event
            document.dispatchEvent(new CustomEvent('themeChanged', {
                detail: { theme: newTheme, mode: isDark ? 'dark' : 'light' }
            }));
            
            // Update game if it exists
            if (game && typeof game.handleThemeChange === 'function') {
                game.handleThemeChange();
            }
        };
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGame);
        } else {
            initGame();
        }
    </script>
</body>
</html>
