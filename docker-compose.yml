version: '3.8'

services:
  learnimals-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      cache_from:
        - learnimals:latest
    image: learnimals:latest
    container_name: learnimals-app
    ports:
      - '8080:8080'
    environment:
      - NODE_ENV=development
      - APP_VERSION=local
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - learnimals-network
    volumes:
      # For development - mount source code
      - ./src:/usr/share/nginx/html/src:ro
      - ./public:/usr/share/nginx/html/public:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Local development database (if needed in future)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: learnimals-db
  #   environment:
  #     POSTGRES_USER: learnimals
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: learnimals
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - learnimals-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U learnimals"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Local monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: learnimals-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - learnimals-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: learnimals-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - '3000:3000'
    networks:
      - learnimals-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  learnimals-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  # postgres-data:
