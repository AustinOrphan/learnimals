<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive place value activities with visual manipulatives featuring Mango the Shark"
    />
    <title>Place Value Activities - Learnimals</title>

    <!-- Import components -->
    <script src="/components/ui/PlaceValueManipulative.js"></script>

    <script type="module">
      import SubjectTemplateLoader from '/utils/subjectTemplateLoader.js';
      import { initPractice, initBuildChallenge } from '/subjects/math/place-value.js';

      // Define content for place value page
      const placeValueOptions = {
        subjectName: 'Place Value Activities',
        subjectLower: 'math',
        subjectDescription: 'Learn place value with interactive manipulatives and visual exercises',
        characterName: 'Mango',
        characterType: 'Shark',
        heroSubtitle: 'Build and break down numbers with place value blocks!',

        // Fallback HTML for feature cards if Card.js doesn't work
        featureCards: `
                    <div class="feature-card">
                        <div id="pv-challenge"></div>
                        <div id="place-value-builder"></div>
                    </div>

                    <div class="feature-card">
                        <h3>Quick Practice</h3>
                        <div id="pv-practice"></div>
                    </div>

                    <div class="feature-card">
                        <h3>Place Value Chart</h3>
                        <div class="place-value-reference">
                            <table class="pv-table">
                                <thead>
                                    <tr>
                                        <th>Thousands</th>
                                        <th>Hundreds</th>
                                        <th>Tens</th>
                                        <th>Ones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>1,000</td>
                                        <td>100</td>
                                        <td>10</td>
                                        <td>1</td>
                                    </tr>
                                    <tr class="example-row">
                                        <td>3</td>
                                        <td>7</td>
                                        <td>4</td>
                                        <td>2</td>
                                    </tr>
                                    <tr class="value-row">
                                        <td>3,000</td>
                                        <td>700</td>
                                        <td>40</td>
                                        <td>2</td>
                                    </tr>
                                </tbody>
                            </table>
                            <p class="table-explanation">
                                The number 3,742 = 3,000 + 700 + 40 + 2
                            </p>
                        </div>
                    </div>
                `,

        // Card.js data for generating feature cards
        featureCardsData: [
          {
            title: '🎯 Build-a-Number Challenge',
            content: `
                            <div id="pv-challenge"></div>
                            <div id="place-value-builder"></div>
                        `,
          },
          {
            title: 'Quick Practice',
            content: `
                            <div id="pv-practice"></div>
                        `,
          },
          {
            title: 'Place Value Chart',
            content: `
                            <div class="place-value-reference">
                                <table class="pv-table">
                                    <thead>
                                        <tr>
                                            <th>Thousands</th>
                                            <th>Hundreds</th>
                                            <th>Tens</th>
                                            <th>Ones</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>1,000</td>
                                            <td>100</td>
                                            <td>10</td>
                                            <td>1</td>
                                        </tr>
                                        <tr class="example-row">
                                            <td>3</td>
                                            <td>7</td>
                                            <td>4</td>
                                            <td>2</td>
                                        </tr>
                                        <tr class="value-row">
                                            <td>3,000</td>
                                            <td>700</td>
                                            <td>40</td>
                                            <td>2</td>
                                        </tr>
                                    </tbody>
                                </table>
                                <p class="table-explanation">
                                    The number 3,742 = 3,000 + 700 + 40 + 2
                                </p>
                            </div>
                        `,
            imageUrl: '/public/images/math-parrot.png',
            imageAlt: 'Math helper parrot',
          },
        ],
      };

      function setupActivities() {
        let builder = null;
        const container = document.getElementById('place-value-builder');
        if (container && window.PlaceValueManipulative) {
          builder = new PlaceValueManipulative({
            containerId: 'place-value-builder',
            maxNumber: 9999,
            mode: 'compose',
          });
        } else if (container) {
          container.innerHTML = `
                                <p>Place Value Builder is loading...</p>
                                <p>Try refreshing the page if it doesn't appear.</p>
                            `;
        }

        initBuildChallenge('pv-challenge', builder);
        initPractice('pv-practice');
      }

      // Why this is not a one-shot init: renderTemplate rewrites the whole
      // document (document.write), then the template's own script renders the
      // feature cards with Card.js — on 'componentsLoaded' AND again ~100ms after
      // DOMContentLoaded — clearing #feature-cards-container each time. A fixed
      // setTimeout init raced with (and was wiped by) that re-render, so every
      // activity ended up empty (worst on slower/mobile devices).
      //
      // Instead, (re)initialise whenever fresh, empty activity containers appear.
      // A per-element flag makes this idempotent: the same container is set up
      // once, but a card re-render creates new (unflagged) containers that get
      // re-initialised, so the activities can never be left blank.
      function setupWhenReady() {
        const builderEl = document.getElementById('place-value-builder');
        const challengeEl = document.getElementById('pv-challenge');
        const practiceEl = document.getElementById('pv-practice');
        if (!builderEl || !challengeEl || !practiceEl) return;
        if (builderEl.dataset.pvInit === '1') return; // this container is already set up
        builderEl.dataset.pvInit = '1';
        setupActivities();
      }

      document.addEventListener('DOMContentLoaded', async () => {
        await SubjectTemplateLoader.renderTemplate(placeValueOptions);

        // renderTemplate rewrites the document (document.write); when this
        // resolves the parser may not have created <body> yet, so observe the
        // <html> root (documentElement), which exists as soon as parsing starts.
        // Guard anyway and retry on the next frame if even that isn't ready.
        const attach = () => {
          const root = document.body || document.documentElement;
          if (!root) {
            requestAnimationFrame(attach);
            return;
          }
          setupWhenReady();
          const observer = new MutationObserver(setupWhenReady);
          observer.observe(root, { childList: true, subtree: true });
          // The card re-renders all happen in the first moments after load; stop
          // watching once things have settled.
          setTimeout(() => observer.disconnect(), 6000);
        };
        attach();
      });
    </script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/styles/base/styles.css" />
    <link rel="stylesheet" href="/styles/components/navbar.css" />
    <link rel="stylesheet" href="/subjects/math/math.css" />
    <link rel="stylesheet" href="/subjects/math/place-value.css" />
  </head>
  <body>
    <!-- This content will be replaced by the template -->
    <div class="loading-container">
      <p>Loading place value activities...</p>
      <div class="loading-spinner"></div>
    </div>
  </body>
</html>
