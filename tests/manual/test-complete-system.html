<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Character System Test Suite</title>
    <style>
      body {
        font-family: 'Courier New', monospace;
        padding: 20px;
        background: #1a1a1a;
        color: #00ff00;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .output {
        background: #000;
        padding: 20px;
        border-radius: 8px;
        margin: 20px 0;
        min-height: 500px;
      }
      .test-controls {
        margin: 20px 0;
      }
      button {
        background: #333;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 10px 20px;
        margin: 5px;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #00ff00;
        color: #000;
      }
      .status {
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      .success {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid #00ff00;
      }
      .error {
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid #ff0000;
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧪 Complete Character Generation Test Suite</h1>

      <div class="test-controls">
        <button onclick="runFullTestSuite()">🚀 Run Complete Test Suite</button>
        <button onclick="runRegressionTests()">🔧 Run Regression Tests Only</button>
        <button onclick="clearOutput()">🗑️ Clear Output</button>
      </div>

      <div id="status" class="status success">Ready to run tests. Click "Run Complete Test Suite" to begin.</div>

      <div id="output" class="output">
        <div>Console output will appear here...</div>
      </div>
    </div>

    <script type="module">
      let output = document.getElementById('output');
      let status = document.getElementById('status');

      // Override console.log to display in our output
      const originalLog = console.log;
      console.log = function (...args) {
        originalLog.apply(console, args);
        const message = args
          .map(arg => (typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)))
          .join(' ');

        const div = document.createElement('div');
        div.style.marginBottom = '5px';
        div.style.wordWrap = 'break-word';

        // Apply color coding based on content
        if (message.includes('✅')) {
          div.style.color = '#00ff00';
        } else if (message.includes('❌')) {
          div.style.color = '#ff0000';
        } else if (message.includes('Test') && message.includes(':')) {
          div.style.color = '#00aaff';
          div.style.fontWeight = 'bold';
        } else if (message.includes('='.repeat(10))) {
          div.style.color = '#ffff00';
          div.style.fontWeight = 'bold';
        }

        div.textContent = message;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
      };

      window.clearOutput = function () {
        output.innerHTML = '<div>Console output cleared...</div>';
      };

      window.runFullTestSuite = async function () {
        try {
          status.className = 'status success';
          status.textContent = '🚀 Running complete test suite...';

          clearOutput();
          console.log('🧪 Starting Complete Character Generation Test Suite');
          console.log('=' * 60);

          // Import the test module
          const testModule = await import('./src/features/character-generation/test-character-system.js');
          const results = await testModule.default();

          // Update status based on results
          if (results.failed === 0) {
            status.className = 'status success';
            status.textContent = `🎉 All tests passed! (${results.passed}/${results.tests})`;
          } else {
            status.className = 'status error';
            status.textContent = `⚠️ ${results.failed} test(s) failed out of ${results.tests}`;
          }
        } catch (error) {
          status.className = 'status error';
          status.textContent = '❌ Test suite failed to run';
          console.log('❌ Error running test suite:', error.message);
          console.log(error.stack);
        }
      };

      window.runRegressionTests = async function () {
        try {
          status.className = 'status success';
          status.textContent = '🔧 Running regression tests only...';

          clearOutput();
          console.log('🔧 Starting Regression Tests Only');
          console.log('=' * 40);

          // Import and run regression tests
          const { runRegressionTests } = await import('./src/features/character-generation/test-regression.js');
          const results = await runRegressionTests();

          // Update status based on results
          if (results.failed === 0) {
            status.className = 'status success';
            status.textContent = `🎉 All regression tests passed! (${results.passed}/${results.tests})`;
          } else {
            status.className = 'status error';
            status.textContent = `⚠️ ${results.failed} regression test(s) failed out of ${results.tests}`;
          }
        } catch (error) {
          status.className = 'status error';
          status.textContent = '❌ Regression tests failed to run';
          console.log('❌ Error running regression tests:', error.message);
          console.log(error.stack);
        }
      };

      // Auto-run on page load for demonstration
      console.log('Test suite loaded. Use the buttons above to run tests.');
    </script>
  </body>
</html>
