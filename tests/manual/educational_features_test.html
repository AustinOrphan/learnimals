<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educational Features Test - Learnimals</title>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f8f9fa;
    }
    
    .test-header {
      background: linear-gradient(135deg, #6f42c1, #007bff);
      color: white;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .test-section {
      background: white;
      margin-bottom: 2rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .test-section h3 {
      background: #6f42c1;
      color: white;
      margin: 0;
      padding: 1rem;
      font-size: 1.1rem;
    }
    
    .test-content {
      padding: 1.5rem;
    }
    
    .test-result {
      margin: 1rem 0;
      padding: 1rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      background: #f8f9fa;
      border-left: 4px solid #6f42c1;
      white-space: pre-line;
    }
    
    .test-button {
      background: #6f42c1;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      margin: 0.5rem 0.5rem 0.5rem 0;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
    }
    
    .test-button:hover {
      background: #5a2d91;
    }
    
    .success {
      border-left-color: #28a745;
      background: #d4edda;
    }
    
    .error {
      border-left-color: #dc3545;
      background: #f8d7da;
    }
  </style>
</head>
<body>
  <header class="test-header">
    <h1>🎓 Educational Features Test</h1>
    <p>Testing new educational template and GameRegistryUtil methods</p>
  </header>
  
  <div class="test-section">
    <h3>Educational Games Discovery</h3>
    <div class="test-content">
      <button class="test-button" onclick="testEducationalGames()">Get Educational Games</button>
      <button class="test-button" onclick="testGamesByLearningObjectives()">Search by Learning Objectives</button>
      <button class="test-button" onclick="testGamesByAgeRange()">Filter by Age Range</button>
      <div id="educational-games-result" class="test-result"></div>
    </div>
  </div>
  
  <div class="test-section">
    <h3>Lesson Planning Features</h3>
    <div class="test-content">
      <button class="test-button" onclick="testLessonPlanGeneration()">Generate Lesson Plan</button>
      <button class="test-button" onclick="testCurriculumAlignment()">Curriculum Alignment Report</button>
      <div id="lesson-planning-result" class="test-result"></div>
    </div>
  </div>
  
  <div class="test-section">
    <h3>Assessment and Analytics</h3>
    <div class="test-content">
      <button class="test-button" onclick="testAssessmentGames()">Get Assessment Games</button>
      <button class="test-button" onclick="testEducationalScoring()">Test Educational Scoring</button>
      <div id="assessment-result" class="test-result"></div>
    </div>
  </div>
  
  <div class="test-section">
    <h3>Template Validation</h3>
    <div class="test-content">
      <button class="test-button" onclick="testTemplateValidation()">Test Educational Template Validation</button>
      <div id="template-validation-result" class="test-result"></div>
    </div>
  </div>

  <script type="module">
    import { GameRegistryUtil } from '/src/config/gameRegistry.js';
    
    window.GameRegistryUtil = GameRegistryUtil;
    
    // Test functions
    window.testEducationalGames = function() {
      try {
        const educationalGames = GameRegistryUtil.getEducationalGames();
        const result = `Found ${educationalGames.length} educational games:
${educationalGames.map(game => `• ${game.name} (${game.subject})`).join('\n')}`;
        
        document.getElementById('educational-games-result').textContent = result;
        document.getElementById('educational-games-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('educational-games-result').textContent = `Error: ${error.message}`;
        document.getElementById('educational-games-result').className = 'test-result error';
      }
    };
    
    window.testGamesByLearningObjectives = function() {
      try {
        const objectives = ['addition', 'vocabulary'];
        const games = GameRegistryUtil.getGamesByLearningObjectives(objectives);
        const result = `Games matching learning objectives [${objectives.join(', ')}]:
${games.map(game => `• ${game.name} - Objectives: ${game.metadata?.learningObjectives?.join(', ') || 'None'}`).join('\n')}`;
        
        document.getElementById('educational-games-result').textContent = result;
        document.getElementById('educational-games-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('educational-games-result').textContent = `Error: ${error.message}`;
        document.getElementById('educational-games-result').className = 'test-result error';
      }
    };
    
    window.testGamesByAgeRange = function() {
      try {
        const ageRange = '6-12';
        const games = GameRegistryUtil.getGamesByAgeRange(ageRange);
        const result = `Games for age range ${ageRange}:
${games.map(game => `• ${game.name} (Age: ${game.metadata?.ageRange || 'Not specified'})`).join('\n')}`;
        
        document.getElementById('educational-games-result').textContent = result;
        document.getElementById('educational-games-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('educational-games-result').textContent = `Error: ${error.message}`;
        document.getElementById('educational-games-result').className = 'test-result error';
      }
    };
    
    window.testLessonPlanGeneration = function() {
      try {
        const criteria = {
          subject: 'math',
          ageRange: '6-12',
          objectives: ['addition', 'counting'],
          duration: 30
        };
        
        const lessonPlan = GameRegistryUtil.generateLessonPlan(criteria);
        const result = `Lesson Plan Generated:
Subject: ${lessonPlan.criteria.subject}
Age Range: ${lessonPlan.criteria.ageRange}
Total Estimated Time: ${lessonPlan.totalEstimatedTime} minutes

Lesson Structure:
• Warm-up: ${lessonPlan.lessonStructure.warmUp.map(g => g.name).join(', ') || 'None'}
• Main Activity: ${lessonPlan.lessonStructure.mainActivity.map(g => g.name).join(', ') || 'None'}
• Assessment: ${lessonPlan.lessonStructure.assessment.map(g => g.name).join(', ') || 'None'}
• Extension: ${lessonPlan.lessonStructure.extension.map(g => g.name).join(', ') || 'None'}

Learning Path (${lessonPlan.learningPath.length} steps):
${lessonPlan.learningPath.map(step => `${step.step}. ${step.game} (${step.difficulty})`).join('\n')}`;
        
        document.getElementById('lesson-planning-result').textContent = result;
        document.getElementById('lesson-planning-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('lesson-planning-result').textContent = `Error: ${error.message}`;
        document.getElementById('lesson-planning-result').className = 'test-result error';
      }
    };
    
    window.testCurriculumAlignment = function() {
      try {
        const subject = 'math';
        const alignment = GameRegistryUtil.getCurriculumAlignment(subject);
        const result = `Curriculum Alignment Report for ${subject}:
Total Games: ${alignment.totalGames}
Educational Games: ${alignment.educationalGames}
Assessment Capable: ${alignment.assessmentCapable}

Learning Objectives Covered:
${alignment.learningObjectives.map(obj => `• ${obj}`).join('\n')}

Age Ranges Available:
${alignment.ageRanges.map(range => `• ${range}`).join('\n')}

Game Types:
${alignment.gameTypes.map(type => `• ${type}`).join('\n')}

Curriculum Gaps:
${alignment.gaps.map(gap => `• ${gap.type}: ${gap.missing} - ${gap.recommendation}`).join('\n')}

Recommendations:
${alignment.recommendations.map(rec => `• [${rec.priority}] ${rec.category}: ${rec.suggestion}`).join('\n')}`;
        
        document.getElementById('lesson-planning-result').textContent = result;
        document.getElementById('lesson-planning-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('lesson-planning-result').textContent = `Error: ${error.message}`;
        document.getElementById('lesson-planning-result').className = 'test-result error';
      }
    };
    
    window.testAssessmentGames = function() {
      try {
        const assessmentGames = GameRegistryUtil.getAssessmentGames();
        const result = `Assessment-capable games (${assessmentGames.length}):
${assessmentGames.map(game => `• ${game.name} - Features: ${game.features?.join(', ') || 'None'}`).join('\n')}`;
        
        document.getElementById('assessment-result').textContent = result;
        document.getElementById('assessment-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('assessment-result').textContent = `Error: ${error.message}`;
        document.getElementById('assessment-result').className = 'test-result error';
      }
    };
    
    window.testEducationalScoring = function() {
      try {
        const allGames = GameRegistryUtil.getAllGames();
        const scoredGames = allGames.map(game => ({
          name: game.name,
          score: GameRegistryUtil.calculateEducationalScore(game)
        })).sort((a, b) => b.score - a.score);
        
        const result = `Educational Scoring Test (Top 10):
${scoredGames.slice(0, 10).map(game => `• ${game.name}: ${game.score}/100`).join('\n')}`;
        
        document.getElementById('assessment-result').textContent = result;
        document.getElementById('assessment-result').className = 'test-result success';
      } catch (error) {
        document.getElementById('assessment-result').textContent = `Error: ${error.message}`;
        document.getElementById('assessment-result').className = 'test-result error';
      }
    };
    
    window.testTemplateValidation = function() {
      try {
        const testGame = {
          id: 'test-educational-game',
          name: 'Test Educational Game',
          template: 'educational',
          subject: 'math',
          difficulty: ['easy', 'medium'],
          features: ['analytics', 'progress'],
          metadata: {
            gameType: 'educational-quiz',
            ageRange: '6-8',
            learningObjectives: ['addition', 'subtraction']
          }
        };
        
        const validation = GameRegistryUtil.validateGameConfig(testGame);
        const result = `Educational Template Validation:
Valid: ${validation.isValid}
Errors: ${validation.errors.length > 0 ? validation.errors.join(', ') : 'None'}

Test Game Configuration:
${JSON.stringify(testGame, null, 2)}`;
        
        document.getElementById('template-validation-result').textContent = result;
        document.getElementById('template-validation-result').className = validation.isValid ? 'test-result success' : 'test-result error';
      } catch (error) {
        document.getElementById('template-validation-result').textContent = `Error: ${error.message}`;
        document.getElementById('template-validation-result').className = 'test-result error';
      }
    };
    
    console.log('✅ Educational features test page loaded successfully');
  </script>
</body>
</html>
