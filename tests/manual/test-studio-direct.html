<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Studio Import Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      .log {
        margin: 5px 0;
        padding: 8px;
        background: #f5f5f5;
        border-left: 3px solid #007bff;
        font-family: monospace;
      }
      .error {
        border-left-color: #dc3545;
        background: #f8d7da;
      }
      .success {
        border-left-color: #28a745;
        background: #d4edda;
      }
      button {
        margin: 10px;
        padding: 10px 20px;
      }
      #container {
        border: 2px solid #ccc;
        padding: 20px;
        margin: 20px 0;
        min-height: 300px;
      }
    </style>
  </head>
  <body>
    <h1>Direct CustomizationStudio Import Test</h1>

    <button id="test-studio-import">Test Studio Import</button>
    <button id="test-studio-create">Test Studio Creation</button>

    <div id="logs"></div>
    <div id="container"></div>

    <!-- Load BaseComponent globally -->
    <script src="./src/components/BaseComponent.js"></script>

    <script type="module">
      const logs = document.getElementById('logs');
      const container = document.getElementById('container');

      function log(message, type = 'log') {
        const div = document.createElement('div');
        div.className = `log ${type}`;
        div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
        logs.appendChild(div);
        console.log(message);
      }

      document.getElementById('test-studio-import').addEventListener('click', async () => {
        log('🔍 Testing direct CustomizationStudio import...');

        try {
          log('Step 1: Importing CustomizationStudio module...');
          const studioModule = await import('./src/features/character-generation/ui/CustomizationStudio.js');
          log('✅ CustomizationStudio module imported successfully', 'success');
          log(`Module exports: ${Object.keys(studioModule).join(', ')}`);

          // Store for next test
          window.testStudioClass = studioModule.default;
          log('✅ Studio class available for testing', 'success');
        } catch (error) {
          log(`❌ Import failed: ${error.message}`, 'error');
          console.error('Full error:', error);
          console.error('Stack:', error.stack);
        }
      });

      document.getElementById('test-studio-create').addEventListener('click', async () => {
        log('🎨 Testing CustomizationStudio creation...');

        try {
          if (!window.testStudioClass) {
            log('❌ Studio class not available, run import test first', 'error');
            return;
          }

          if (!window.BaseComponent) {
            log('❌ BaseComponent not available globally', 'error');
            return;
          }

          log('Creating CustomizationStudio instance...');
          const studio = new window.testStudioClass({
            container: container,
            characters: [],
            presets: new Map(),
            onCustomizationApplied: data => log('🎨 Customization applied'),
            onClose: () => log('✕ Studio closed'),
          });

          log('✅ CustomizationStudio instance created successfully', 'success');

          log('Rendering studio...');
          studio.render();
          log('✅ Studio rendered successfully', 'success');
        } catch (error) {
          log(`❌ Creation failed: ${error.message}`, 'error');
          console.error('Full error:', error);
        }
      });

      log('🚀 Direct studio import test ready. Click buttons to test.');
    </script>
  </body>
</html>
