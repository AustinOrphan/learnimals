<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Validation Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { margin: 5px 0; padding: 8px; background: #f5f5f5; border-left: 3px solid #007bff; font-family: monospace; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .success { border-left-color: #28a745; background: #d4edda; }
        .warning { border-left-color: #ffc107; background: #fff3cd; }
        button { margin: 10px; padding: 10px 20px; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; max-height: 400px; }
    </style>
</head>
<body>
    <h1>Detailed Validation Test</h1>
    
    <button id="test-factory">Test CharacterFactory Directly</button>
    <button id="test-manual">Test Manual Character Creation</button>
    <button id="test-template">Test Template Loading</button>
    
    <div id="logs"></div>

    <script type="module">
        const logs = document.getElementById('logs');
        
        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logs.appendChild(div);
            console.log(message);
        }

        let CharacterGenerationAPI, CharacterUtils, CharacterFactory, DefaultCharacterTemplate;

        async function init() {
            try {
                const module = await import('./src/features/character-generation/index.js');
                CharacterGenerationAPI = module.CharacterGenerationAPI;
                CharacterUtils = module.CharacterUtils;
                CharacterFactory = module.CharacterFactory;
                DefaultCharacterTemplate = module.DefaultCharacterTemplate;
                log('✅ Character generation system loaded', 'success');
            } catch (error) {
                log(`❌ Failed to load: ${error.message}`, 'error');
                console.error(error);
            }
        }

        document.getElementById('test-factory').addEventListener('click', async () => {
            log('🧪 Testing CharacterFactory directly...');
            
            try {
                // Get the factory instance
                const factory = new CharacterFactory();
                log('✅ CharacterFactory instance created', 'success');
                
                // Test character creation step by step
                const options = {
                    name: 'Test Character',
                    subject: 'math',
                    autoSave: false
                };
                
                log(`Creating character with options: ${JSON.stringify(options, null, 2)}`);
                
                const result = await factory.createCharacter(options);
                
                if (result.success) {
                    log('✅ Character created successfully via factory', 'success');
                    log(`<pre>${JSON.stringify(result.character, null, 2)}</pre>`);
                } else {
                    log(`❌ Factory creation failed: ${result.error}`, 'error');
                    if (result.details) {
                        log(`<pre>Details: ${JSON.stringify(result.details, null, 2)}</pre>`, 'error');
                    }
                }
                
            } catch (error) {
                log(`❌ Factory exception: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        });

        document.getElementById('test-manual').addEventListener('click', async () => {
            log('🧪 Testing manual character creation with validation...');
            
            try {
                // Start with default template
                const character = JSON.parse(JSON.stringify(DefaultCharacterTemplate));
                character.id = CharacterUtils.generateId();
                character.name = 'Manual Test Character';
                character.subject = 'science';
                
                log(`Manual character before validation:`);
                log(`<pre>${JSON.stringify(character, null, 2)}</pre>`);
                
                // Test validation
                const validation = CharacterGenerationAPI.validateCharacter(character);
                
                log(`Validation result: isValid=${validation.isValid}`);
                
                if (!validation.isValid) {
                    log(`❌ Validation errors:`, 'error');
                    log(`<pre>${JSON.stringify(validation.errors, null, 2)}</pre>`, 'error');
                }
                
                if (validation.warnings && validation.warnings.length > 0) {
                    log(`⚠️ Validation warnings:`, 'warning');
                    log(`<pre>${JSON.stringify(validation.warnings, null, 2)}</pre>`, 'warning');
                }
                
                if (validation.isValid) {
                    log('✅ Manual character passes validation', 'success');
                }
                
            } catch (error) {
                log(`❌ Manual test exception: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        });

        document.getElementById('test-template').addEventListener('click', async () => {
            log('🧪 Testing template loading...');
            
            try {
                log(`Default template:`);
                log(`<pre>${JSON.stringify(DefaultCharacterTemplate, null, 2)}</pre>`);
                
                // Check template against schema
                const validation = CharacterGenerationAPI.validateCharacter(DefaultCharacterTemplate);
                
                log(`Template validation: isValid=${validation.isValid}`);
                
                if (!validation.isValid) {
                    log(`❌ Template validation errors:`, 'error');
                    log(`<pre>${JSON.stringify(validation.errors, null, 2)}</pre>`, 'error');
                } else {
                    log('✅ Default template is valid', 'success');
                }
                
                // Test with added ID and name
                const testTemplate = {
                    ...DefaultCharacterTemplate,
                    id: 'test-template-123',
                    name: 'Template Test'
                };
                
                const testValidation = CharacterGenerationAPI.validateCharacter(testTemplate);
                log(`Template with ID/name validation: isValid=${testValidation.isValid}`);
                
                if (!testValidation.isValid) {
                    log(`❌ Template with ID/name errors:`, 'error');
                    log(`<pre>${JSON.stringify(testValidation.errors, null, 2)}</pre>`, 'error');
                } else {
                    log('✅ Template with ID/name is valid', 'success');
                }
                
            } catch (error) {
                log(`❌ Template test exception: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        });

        init();
        log('🚀 Detailed validation test page loaded. Click buttons to diagnose validation issues.');
    </script>
</body>
</html>
