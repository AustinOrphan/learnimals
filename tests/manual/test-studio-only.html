<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Studio Only</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { margin: 5px 0; padding: 8px; background: #f5f5f5; border-left: 3px solid #007bff; font-family: monospace; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .success { border-left-color: #28a745; background: #d4edda; }
        .warning { border-left-color: #ffc107; background: #fff3cd; }
        button { margin: 10px; padding: 10px 20px; }
        #container { border: 2px solid #ccc; padding: 20px; margin: 20px 0; min-height: 300px; }
    </style>
</head>
<body>
    <h1>Test CustomizationStudio Only</h1>
    
    <button id="test-studio">Test CustomizationStudio</button>
    <button id="check-basecomponent">Check BaseComponent</button>
    
    <div id="logs"></div>
    <div id="container"></div>

    <!-- Load BaseComponent globally -->
    <script src="./src/components/BaseComponent.js"></script>

    <script type="module">
        const logs = document.getElementById('logs');
        const container = document.getElementById('container');
        
        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logs.appendChild(div);
            console.log(message);
        }

        document.getElementById('check-basecomponent').addEventListener('click', () => {
            log('🔍 Checking BaseComponent availability...');
            
            if (typeof window.BaseComponent !== 'undefined') {
                log('✅ BaseComponent is available globally', 'success');
                
                try {
                    const testComponent = new window.BaseComponent({
                        tagName: 'div',
                        className: 'test-base',
                        innerHTML: '<p>BaseComponent test works!</p>'
                    });
                    
                    container.innerHTML = '';
                    container.appendChild(testComponent.element);
                    log('✅ BaseComponent can create elements', 'success');
                } catch (error) {
                    log(`❌ BaseComponent error: ${error.message}`, 'error');
                }
            } else {
                log('❌ BaseComponent not available', 'error');
            }
        });

        document.getElementById('test-studio').addEventListener('click', async () => {
            log('🎨 Testing CustomizationStudio...');
            
            try {
                if (!window.BaseComponent) {
                    log('❌ BaseComponent not available for CustomizationStudio', 'error');
                    return;
                }
                
                log('Importing CustomizationStudio...');
                const { default: CustomizationStudio } = await import('./src/features/character-generation/ui/CustomizationStudio.js');
                log('✅ CustomizationStudio imported successfully', 'success');
                
                log('Creating CustomizationStudio instance...');
                const studio = new CustomizationStudio({
                    container: container,
                    characters: [],
                    presets: new Map(),
                    onCustomizationApplied: (data) => {
                        log('🎨 Customization applied', 'success');
                    },
                    onClose: () => {
                        log('✕ Studio closed', 'warning');
                    }
                });
                log('✅ CustomizationStudio instance created', 'success');
                
                log('Rendering CustomizationStudio...');
                studio.render();
                log('✅ CustomizationStudio rendered', 'success');
                
                // Check if content was actually added
                setTimeout(() => {
                    if (container.children.length > 0) {
                        log('✅ Studio content is visible in container', 'success');
                    } else {
                        log('❌ No content visible in container', 'error');
                    }
                }, 100);
                
            } catch (error) {
                log(`❌ CustomizationStudio error: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        });

        log('🚀 Studio test page loaded. Click buttons to test.');
    </script>
</body>
</html>
