<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Factory Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { margin: 5px 0; padding: 8px; background: #f5f5f5; border-left: 3px solid #007bff; font-family: monospace; }
        .error { border-left-color: #dc3545; background: #f8d7da; }
        .success { border-left-color: #28a745; background: #d4edda; }
        button { margin: 10px; padding: 10px 20px; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; max-height: 300px; }
    </style>
</head>
<body>
    <h1>Fresh Factory Test</h1>
    
    <button id="test-fresh-factory">Test Fresh CharacterFactory</button>
    <button id="test-singleton-factory">Test Singleton Factory</button>
    <button id="compare-validators">Compare Validators</button>
    
    <div id="logs"></div>

    <script type="module">
        const logs = document.getElementById('logs');
        
        function log(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            logs.appendChild(div);
            console.log(message);
        }

        let CharacterFactory, characterFactory, CharacterValidator;

        async function init() {
            try {
                // Import fresh modules
                const timestamp = Date.now();
                const module = await import(`./src/features/character-generation/index.js?v=${timestamp}`);
                const factoryModule = await import(`./src/features/character-generation/core/CharacterFactory.js?v=${timestamp}`);
                const validatorModule = await import(`./src/features/character-generation/validation/CharacterValidator.js?v=${timestamp}`);
                
                CharacterFactory = factoryModule.CharacterFactory;
                characterFactory = module.characterFactory; // singleton
                CharacterValidator = validatorModule.CharacterValidator;
                
                log('✅ Modules loaded', 'success');
            } catch (error) {
                log(`❌ Failed to load: ${error.message}`, 'error');
                console.error(error);
            }
        }

        document.getElementById('test-fresh-factory').addEventListener('click', async () => {
            log('🧪 Testing fresh CharacterFactory instance...');
            
            try {
                // Create a brand new factory instance
                const freshFactory = new CharacterFactory();
                log('✅ Fresh factory created', 'success');
                
                const result = await freshFactory.createCharacter({
                    name: 'Fresh Test',
                    subject: 'math',
                    autoSave: false
                });
                
                if (result.success) {
                    log('✅ Fresh factory character creation succeeded!', 'success');
                } else {
                    log(`❌ Fresh factory failed: ${result.error}`, 'error');
                    if (result.details) {
                        log(`<pre>Errors:\n${JSON.stringify(result.details, null, 2)}</pre>`, 'error');
                    }
                }
                
            } catch (error) {
                log(`❌ Fresh factory exception: ${error.message}`, 'error');
                console.error(error);
            }
        });

        document.getElementById('test-singleton-factory').addEventListener('click', async () => {
            log('🧪 Testing singleton CharacterFactory instance...');
            
            try {
                const result = await characterFactory.createCharacter({
                    name: 'Singleton Test',
                    subject: 'math',
                    autoSave: false
                });
                
                if (result.success) {
                    log('✅ Singleton factory character creation succeeded!', 'success');
                } else {
                    log(`❌ Singleton factory failed: ${result.error}`, 'error');
                    if (result.details) {
                        log(`<pre>Errors:\n${JSON.stringify(result.details, null, 2)}</pre>`, 'error');
                    }
                }
                
            } catch (error) {
                log(`❌ Singleton factory exception: ${error.message}`, 'error');
                console.error(error);
            }
        });

        document.getElementById('compare-validators').addEventListener('click', () => {
            log('🧪 Comparing validators...');
            
            try {
                // Test fresh validator
                const freshValidator = new CharacterValidator();
                const testArray = ['test'];
                const schema = { type: 'array' };
                
                freshValidator.validateProperty('testArray', testArray, schema);
                const freshResult = freshValidator.getResult();
                
                log(`Fresh validator: isValid=${freshResult.isValid}`);
                if (!freshResult.isValid) {
                    log(`Fresh validator errors: ${JSON.stringify(freshResult.errors)}`, 'error');
                }
                
                // Test singleton factory validator
                const singletonValidator = characterFactory.validator;
                singletonValidator.errors = []; // Reset
                singletonValidator.warnings = [];
                
                singletonValidator.validateProperty('testArray', testArray, schema);
                const singletonResult = singletonValidator.getResult();
                
                log(`Singleton validator: isValid=${singletonResult.isValid}`);
                if (!singletonResult.isValid) {
                    log(`Singleton validator errors: ${JSON.stringify(singletonResult.errors)}`, 'error');
                }
                
            } catch (error) {
                log(`❌ Validator comparison exception: ${error.message}`, 'error');
                console.error(error);
            }
        });

        init();
        log('🚀 Fresh factory test loaded.');
    </script>
</body>
</html>
