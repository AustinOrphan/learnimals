# Vale configuration for Learnimals project
# Customized for educational web application documentation

StylesPath = .vale/styles
MinAlertLevel = warning

# Use our custom vocabulary
Vocab = Learnimals

# Packages specify pre-built style guides
Packages = Microsoft, Google

# Global settings
[*]
BasedOnStyles = Vale, Learnimals

# Markdown files - our primary documentation format
[*.md]
BasedOnStyles = Vale, Learnimals, Microsoft, Google

# Disable overly strict rules for technical documentation
Microsoft.Contractions = NO
Microsoft.FirstPerson = NO
Microsoft.Passive = suggestion
Microsoft.Wordiness = suggestion
Microsoft.Semicolon = NO
Microsoft.HeadingAcronyms = NO
Microsoft.Headings = NO
Microsoft.Adverbs = suggestion
Microsoft.Acronyms = suggestion

Google.FirstPerson = NO
Google.Passive = suggestion
Google.Will = suggestion
Google.WordList = suggestion
Google.Parens = NO
Google.Semicolons = NO
Google.Headings = NO
Google.Acronyms = suggestion

# Allow spelling exceptions from our vocabulary
Vale.Spelling = error

# Architecture decision records have different requirements
[docs/architecture/*.md]
BasedOnStyles = Vale, Learnimals
Microsoft.Passive = NO
Google.Passive = NO

# API documentation can be more technical
[docs/development/api/*.md]
BasedOnStyles = Vale, Learnimals
Microsoft.Passive = NO
Google.Passive = NO
Microsoft.Acronyms = NO
Google.Acronyms = NO

# Testing documentation needs technical language
[docs/testing/*.md]
BasedOnStyles = Vale, Learnimals
Microsoft.Passive = NO
Google.Passive = NO
Microsoft.Wordiness = NO

# HTML files - lighter checks
[*.{html,htm}]
BasedOnStyles = Vale, Learnimals
# Transform HTML to text for linting
Transform = /\.html?$/ -> .txt
Vale.Spelling = warning

# Code comments in JS/TS files
[*.{js,ts,jsx,tsx}]
BasedOnStyles = Vale, Learnimals
BlockIgnores = (?s) *([\'"`].*?[\'"`]|/\*.*?\*/)
Vale.Spelling = warning

# JSON and YAML files - minimal checks
[*.{json,yml,yaml}]
BasedOnStyles = Learnimals
Vale.Spelling = NO

# Plain text files
[*.txt]
BasedOnStyles = Vale, Learnimals
Vale.Spelling = warning