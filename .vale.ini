# Vale configuration for Learnimals project
StylesPath = .vale/styles

MinAlertLevel = suggestion

# Packages specify pre-built style guides
Packages = Microsoft, Google

[*.md]
# BasedOnStyles specifies which styles to use
BasedOnStyles = Vale, Microsoft, Google

# Disable some rules that may be too strict for technical documentation
Microsoft.Contractions = NO
Microsoft.FirstPerson = NO
Google.FirstPerson = NO

[*.{html,htm}]
BasedOnStyles = Vale, Microsoft
# Transform HTML to text for linting
Transform = /\.html?$/ -> .txt

[*.txt]
BasedOnStyles = Vale, Microsoft, Google