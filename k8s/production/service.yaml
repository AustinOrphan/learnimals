apiVersion: v1
kind: Service
metadata:
  name: learnimals-app-service
  namespace: production
  labels:
    app: learnimals-app
    environment: production
  # ClusterIP service - AWS load balancer annotations removed as they don't apply
spec:
  selector:
    app: learnimals-app
    environment: production
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: learnimals-app-headless
  namespace: production
  labels:
    app: learnimals-app
    environment: production
spec:
  selector:
    app: learnimals-app
    environment: production
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
  clusterIP: None
